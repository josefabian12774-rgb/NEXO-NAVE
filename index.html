<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Nave | Interfaz de Silicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; min-height: 100vh; overflow: hidden; }
        
        /* Efecto de Reactor Activo */
        @keyframes reactor-on {
            0% { box-shadow: 0 0 20px #ff6400; transform: scale(1); }
            50% { box-shadow: 0 0 50px #ff3300; transform: scale(1.05); }
            100% { box-shadow: 0 0 20px #ff6400; transform: scale(1); }
        }
        .active-core { animation: reactor-on 2s infinite ease-in-out; border: 4px solid #ff6400 !important; }

        /* Botón del Pollo (Gatillo de Energía) */
        .btn-pollo {
            position: absolute; inset: 0; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,100,0,0.4) 0%, transparent 70%);
            border: 2px solid #ff6400;
            z-index: 100; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 14px; text-shadow: 0 0 10px #ff6400;
        }

        /* Pantalla de Silicio Transparente */
        .pantalla-silicio {
            position: fixed; inset: 15px; background: rgba(0, 20, 40, 0.9);
            backdrop-filter: blur(20px); border: 2px solid #00f2ff;
            border-radius: 30px; z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transform: translateY(100%); transition: 0.5s cubic-bezier(0.17, 0.84, 0.44, 1);
            opacity: 0; pointer-events: none;
        }
        .pantalla-silicio.visible { transform: translateY(0); opacity: 1; pointer-events: all; }

        /* Variedades (Push-up Estilo Binario) */
        .btn-variedad {
            width: 100%; padding: 15px; margin: 5px 0; background: rgba(0, 242, 255, 0.1);
            border: 1px solid #00f2ff; color: #00f2ff; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-variedad:hover { background: #00f2ff; color: #000; }

        .orbit-item { transition: 0.4s; z-index: 50; }
        .orbit-item:active { transform: scale(1.5); }
        
        [v-cloak] { display: none; }
    </style>
</head>
<body class="flex justify-center items-center">
    <div id="app" v-cloak class="w-full max-w-lg h-screen flex flex-col items-center py-6 px-4 relative">
        
        <header class="text-center mb-4">
            <h1 class="text-2xl font-black tracking-widest text-orange-500 italic uppercase">NEXO NAVE</h1>
            <p class="text-[8px] text-zinc-500">REACTOR: {{ sistemaIniciado ? 'ONLINE' : 'OFFLINE' }}</p>
        </header>

        <div class="relative w-[340px] h-[340px] flex items-center justify-center mt-10">
            <div class="absolute inset-0 border border-orange-500/10 rounded-full animate-[spin_60s_linear_infinite]"></div>
            
            <div class="w-44 h-44 rounded-full overflow-hidden relative flex items-center justify-center bg-black"
                 :class="{'active-core': sistemaIniciado}">
                
                <img :src="getURL('pollo-reactor.webp')" class="w-full h-full object-cover" 
                     :class="sistemaIniciado ? 'opacity-100' : 'opacity-20'">

                <div v-if="!sistemaIniciado" @click="activarSistema" class="btn-pollo">
                    PUSH TO ACTIVE
                </div>
            </div>

            <div v-for="(item, index) in platos" :key="item.id" 
                 :style="getPos(index, platos.length, 135)"
                 @click="abrirPanel(item)"
                 class="absolute w-16 h-16 rounded-xl bg-black border border-white/10 overflow-hidden orbit-item">
                <img :src="getURL(item.img)" class="w-full h-full object-cover" :class="{'grayscale opacity-30': !sistemaIniciado}">
                <p class="absolute bottom-0 w-full text-center text-[6px] font-bold uppercase bg-black/90 py-1">{{item.label}}</p>
            </div>
        </div>

        <div class="pantalla-silicio" :class="{'visible': panelActivo}">
            <div v-if="seleccionado" class="w-full p-10 text-center">
                <div class="w-28 h-28 mx-auto mb-6 rounded-full border-2 border-cyan-400 overflow-hidden shadow-[0_0_30px_cyan]">
                    <img :src="getURL(seleccionado.img)" class="w-full h-full object-cover">
                </div>
                <h2 class="text-cyan-400 text-2xl font-black uppercase mb-8">{{seleccionado.label}}</h2>
                
                <p class="text-[8px] text-cyan-400/50 mb-4 tracking-[0.5em]">SELECCIONE VARIEDAD</p>
                <button v-for="v in seleccionado.variedades" @click="pedir(v)" class="btn-variedad">
                    {{ v }}
                </button>

                <button @click="panelActivo = false" class="mt-10 text-red-500 font-bold text-xs uppercase tracking-widest">
                    Cerrar Interfaz
                </button>
            </div>
        </div>

        <div class="mt-auto mb-10 w-full max-w-xs grid grid-cols-3 gap-3">
            <div v-for="bev in bebidas" :key="bev.id" @click="abrirPanel(bev)" 
                 class="border border-zinc-900 aspect-[3/4] rounded-lg overflow-hidden relative cursor-pointer">
                <img :src="getURL(bev.img)" class="w-full h-full object-cover opacity-60">
                <div class="absolute inset-0 flex flex-col justify-end p-2 bg-gradient-to-t from-black">
                    <span class="text-[7px] font-black uppercase text-orange-500 text-center">{{bev.label}}</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    base: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public',
                    sistemaIniciado: false,
                    panelActivo: false,
                    seleccionado: null,
                    platos: [
                        { id: 1, img: 'asado-escolta.webp', label: 'Asado', variedades: ['Costillar', 'Vacío', 'Achuras'] },
                        { id: 2, img: 'milanga-soberana.webp', label: 'Milanesa', variedades: ['Frita', 'Napolitana'] },
                        { id: 3, img: 'empanada-escuadron.webp', label: 'Empanadas', variedades: ['Carne', 'Pollo', 'JyQ'] },
                        { id: 4, img: 'pizza-core.webp', label: 'Pizza', variedades: ['Muzza', 'Especial'] },
                        { id: 5, img: 'flan-casero-nexo.webp', label: 'Postre', variedades: ['Dulce de Leche', 'Mixto'] },
                        { id: 6, img: 'papas-mega-reactor.webp', label: 'Papas', variedades: ['Cheddar', 'Solas'] },
                        { id: 10, img: 'mixta-organica.webp', label: 'Ensalada', variedades: ['Mixta', 'Rusa'] }
                    ],
                    bebidas: [
                        { id: 7, img: 'birra-cryo-amber.webp', label: 'Cerveza', variedades: ['Lata', 'Litro'] },
                        { id: 8, img: 'cava-tinto-premium.webp', label: 'Vino', variedades: ['Copa', 'Botella'] },
                        { id: 9, img: 'soda-lemon-reactor.webp', label: 'Gaseosa', variedades: ['Coca', 'Sprite'] }
                    ]
                }
            },
            methods: {
                getURL(n) { return `${this.base}/${n}`; },
                getPos(i, total, radius) {
                    const angle = (i * (360 / total) - 90) * (Math.PI / 180);
                    return `transform: translate(${Math.cos(angle)*radius}px, ${Math.sin(angle)*radius}px)`;
                },
                activarSistema() {
                    this.sistemaIniciado = true;
                    // Sonidos
                    const motor = new Audio(this.getURL('sonido-motor.mp3'));
                    motor.loop = true; motor.volume = 0.2; motor.play();
                    new Audio(this.getURL('click-reactor.mp3')).play();
                },
                abrirPanel(item) {
                    if(!this.sistemaIniciado) return;
                    new Audio(this.getURL('click-reactor.mp3')).play();
                    this.seleccionado = item;
                    this.panelActivo = true;
                },
                pedir(v) {
                    const txt = encodeURIComponent(`🚀 *NEXO NAVE*\nSolicitud: *${this.seleccionado.label}*\nVariedad: *${v}*`);
                    window.open(`https://wa.me/5492964123456?text=${txt}`);
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
