<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Nave | Protocolo Activo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; min-height: 100vh; overflow: hidden; }
        
        /* Efecto de energía del reactor */
        @keyframes reactor-glow {
            0% { box-shadow: 0 0 15px #ff6400; filter: brightness(1); }
            50% { box-shadow: 0 0 45px #ff3300; filter: brightness(1.2); }
            100% { box-shadow: 0 0 15px #ff6400; filter: brightness(1); }
        }
        .reactor-on { animation: reactor-glow 2s infinite ease-in-out; border: 3px solid #ff6400 !important; }

        /* Botón de activación central */
        .btn-active-trigger {
            background: rgba(255, 100, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 2px solid #ff6400;
            color: #ff6400;
            text-shadow: 0 0 10px #ff6400;
            cursor: pointer;
            z-index: 100;
            box-shadow: inset 0 0 15px rgba(255,100,0,0.5);
        }
        .btn-active-trigger:hover { background: #ff6400; color: #000; }

        .orbit-item { transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .orbit-item:hover { border-color: #ff6400; transform: scale(1.1); box-shadow: 0 0 20px #ff6400; }
        
        [v-cloak] { display: none; }
    </style>
</head>
<body class="flex justify-center items-center">
    <div id="app" v-cloak class="w-full max-w-lg h-screen flex flex-col items-center py-6 px-4 relative">
        
        <header class="text-center mb-4 z-50">
            <h1 class="text-2xl font-black tracking-[0.2em] text-orange-500 italic uppercase">NEXO NAVE</h1>
            <p class="text-[8px] tracking-[0.3em] text-zinc-500 uppercase">Reactor Status: 
                <span :class="sistemaIniciado ? 'text-green-500 font-bold' : 'text-red-500'">
                    {{ sistemaIniciado ? 'ACTIVE' : 'OFFLINE' }}
                </span>
            </p>
        </header>

        <div class="relative w-[340px] h-[340px] flex items-center justify-center mt-8">
            <div class="absolute inset-0 border border-orange-500/10 rounded-full animate-[spin_60s_linear_infinite]"></div>
            
            <div class="w-40 h-40 rounded-full overflow-hidden relative flex items-center justify-center bg-zinc-950 z-50 shadow-2xl"
                 :class="{'reactor-on': sistemaIniciado}">
                
                <img :src="getURL('pollo-reactor.webp')" class="w-full h-full object-cover transition-all duration-1000"
                     :class="sistemaIniciado ? 'opacity-100' : 'opacity-20 grayscale'">

                <button v-if="!sistemaIniciado" @click="activarNave" 
                        class="absolute inset-4 rounded-full btn-active-trigger font-black text-[12px] uppercase">
                    Reactor<br><span class="text-2xl">ACTIVE</span>
                </button>
            </div>

            <div v-for="(item, index) in platos" :key="item.id" 
                 :style="getPos(index, platos.length, 130)"
                 @click="seleccionar(item)"
                 class="absolute w-16 h-16 rounded-xl bg-black/80 orbit-item overflow-hidden cursor-pointer shadow-2xl">
                <img :src="getURL(item.img)" class="w-full h-full object-cover" :class="{'grayscale opacity-20': !sistemaIniciado}">
                <p class="absolute bottom-0 w-full text-center text-[5px] font-bold uppercase bg-black/90 py-1">{{item.label}}</p>
            </div>
        </div>

        <div class="mt-auto mb-10 w-full max-w-xs grid grid-cols-3 gap-3">
            <div v-for="bev in bebidas" :key="bev.id" @click="seleccionar(bev)" 
                 class="border border-zinc-900 aspect-[3/4] rounded-lg overflow-hidden relative cursor-pointer hover:border-orange-500">
                <img :src="getURL(bev.img)" class="w-full h-full object-cover opacity-60">
                <div class="absolute inset-0 flex flex-col justify-end p-2 bg-gradient-to-t from-black">
                    <span class="text-[7px] font-black uppercase text-orange-500 text-center">{{bev.label}}</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    base: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public',
                    sistemaIniciado: false,
                    audioMotor: null,
                    audioClick: null,
                    platos: [
                        { id: 1, img: 'asado-escolta.webp', label: 'Asado' },
                        { id: 2, img: 'milanga-soberana.webp', label: 'Milanga' },
                        { id: 3, img: 'empanada-escuadron.webp', label: 'Empanada' },
                        { id: 4, img: 'pizza-core.webp', label: 'Pizzas' },
                        { id: 5, img: 'flan-casero-nexo.webp', label: 'Postre' },
                        { id: 6, img: 'papas-mega-reactor.webp', label: 'Papas' },
                        { id: 10, img: 'mixta-organica.webp', label: 'Ensalada' }
                    ],
                    bebidas: [
                        { id: 7, img: 'birra-cryo-amber.webp', label: 'Cerveza' },
                        { id: 8, img: 'cava-tinto-premium.webp', label: 'Cava' },
                        { id: 9, img: 'soda-lemon-reactor.webp', label: 'Gaseosa' }
                    ]
                }
            },
            methods: {
                getURL(n) { return `${this.base}/${n}`; },
                getPos(i, total, radius) {
                    const angle = (i * (360 / total) - 90) * (Math.PI / 180);
                    return `transform: translate(${Math.cos(angle)*radius}px, ${Math.sin(angle)*radius}px)`;
                },
                activarNave() {
                    this.sistemaIniciado = true;
                    
                    // Inicializar audios al momento del click para que el navegador los permita
                    this.audioMotor = new Audio(this.getURL('sonido-motor.mp3'));
                    this.audioMotor.loop = true;
                    this.audioMotor.volume = 0.3;
                    this.audioMotor.play();

                    this.audioClick = new Audio(this.getURL('click-reactor.mp3'));
                    this.audioClick.play();
                },
                sonarClick() {
                    if(this.audioClick) {
                        this.audioClick.currentTime = 0;
                        this.audioClick.play();
                    }
                },
                seleccionar(item) {
                    if(!this.sistemaIniciado) return;
                    this.sonarClick();
                    // Simulación de pedido
                    console.log("Unidad seleccionada: " + item.label);
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
