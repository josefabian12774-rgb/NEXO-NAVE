<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POMPÓN NAVE - HIGH-TECH HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { 
            background: #000; background-image: radial-gradient(circle at center, #1a0500 0%, #000 100%);
            color: #fff; font-family: 'Orbitron', sans-serif;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column;
        }

        header { height: 8vh; display: flex; align-items: center; justify-content: center; z-index: 50; }
        .titulo { font-size: 1.1rem; font-weight: 900; font-style: italic; letter-spacing: 2px; }
        .titulo span { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        /* ESCENA CENTRAL */
        .main-scene { height: 60vh; position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }

        /* REACTOR */
        .reactor-wrap { position: relative; width: 160px; height: 160px; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .ring-fire { position: absolute; inset: -8px; border: 2px solid transparent; border-top: 2px solid #ff0000; border-bottom: 2px solid #ff4500; border-radius: 50%; animation: spin 3s linear infinite; filter: drop-shadow(0 0 8px #ff0000); }
        .inner-chassis { width: 140px; height: 140px; background: #0a0a0a; border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 30px #ff450033; }
        .img-core { width: 95px; filter: drop-shadow(0 0 15px #ff4500); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* PLATOS (Alineación Corregida) */
        .hud-card {
            position: absolute; width: 90px; background: rgba(10, 10, 10, 0.9); 
            border: 1px solid #222; border-left: 3px solid #ff0000;
            padding: 5px; text-align: center; z-index: 20;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .name { font-size: 6px; font-weight: 900; color: #ffae00; margin-bottom: 2px; line-height: 1; }
        .price { font-size: 10px; font-weight: 900; color: #fff; }

        /* Coordenadas simétricas */
        .p-empanadas { top: -40px; left: -35px; }
        .p-asado { top: -80px; left: 50%; transform: translateX(-50%); }
        .p-pizzas { top: -40px; right: -35px; }
        .p-sandwich { bottom: -40px; left: -35px; }
        .p-ensaladas { bottom: -80px; left: 50%; transform: translateX(-50%); }
        .p-papas { bottom: -40px; right: -35px; }

        .side-btn { position: absolute; width: 55px; height: 30px; background: #000; border: 1px solid #ff0000; color: #ff0000; font-size: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .btn-salsas { left: -75px; top: 50%; transform: translateY(-50%); clip-path: polygon(20% 0%, 100% 0%, 100% 100%, 20% 100%, 0% 50%); }
        .btn-postres { right: -75px; top: 50%; transform: translateY(-50%); clip-path: polygon(0% 0%, 80% 0%, 100% 50%, 80% 100%, 0% 100%); }

        /* BEBIDAS FUTURISTAS (Viales de energía) */
        .crio-chamber { height: 20vh; width: 100%; display: flex; justify-content: center; gap: 10px; padding: 15px; background: rgba(0,0,0,0.9); border-top: 1px solid #1a1a1a; }
        .crio-slot { 
            flex: 1; border: 1px solid #ff450044; background: linear-gradient(180deg, #0f0f0f 0%, #1a0800 100%);
            border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.1); position: relative; overflow: hidden;
        }
        .crio-slot::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #ff4500; opacity: 0.5; }
        .crio-label { font-size: 5px; color: #aaa; letter-spacing: 1px; }
        .crio-price { font-size: 10px; color: #ffae00; font-weight: 900; margin-top: 2px; }

        /* PUSH-UP MEJORADO */
        #push-up {
            position: fixed; bottom: -110%; left: 0; width: 100%; height: 65%;
            background: rgba(5,5,5,0.98); border-top: 3px solid #ff0000; z-index: 200; 
            transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); padding: 25px;
            display: flex; flex-direction: column; align-items: center;
        }
        #push-up.active { bottom: 0; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #ff0000; cursor: pointer; }
        
        /* BOTÓN DE IGNICIÓN (CONFIRMAR) */
        .confirm-btn { 
            margin-top: auto; width: 100%; background: #990000; color: #fff; 
            padding: 18px; font-weight: 900; border-radius: 4px; border: 1px solid #ff0000;
            text-transform: uppercase; letter-spacing: 2px; font-size: 14px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }
        .confirm-btn:active { background: #ff0000; transform: scale(0.98); }

        nav { height: 12vh; width: 100%; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; font-size: 9px; color: #333; }
        .active { color: #ff0000; font-weight: 900; text-shadow: 0 0 5px #ff0000; }
    </style>
</head>
<body>

    <header>
        <div class="titulo italic">POMPÓN <span>NAVE</span></div>
    </header>

    <main class="main-scene">
        <div class="reactor-wrap">
            <div class="ring-fire"></div>
            <div class="inner-chassis">
                <img src="https://i.ibb.co/6R0n7Y0/pollo-reactor.png" class="img-core">
            </div>

            <div class="hud-card p-empanadas" onclick="op('EMPANADAS', '$8.000')"><div class="name">EMPANADAS</div><div class="price">$8.000</div></div>
            <div class="hud-card p-asado" onclick="op('ASADO', '$12.500')"><div class="name">ASADO</div><div class="price">$12.500</div></div>
            <div class="hud-card p-pizzas" onclick="op('PIZZAS', '$4.200')"><div class="name">PIZZAS</div><div class="price">$4.200</div></div>
            
            <div class="side-btn btn-salsas" onclick="op('SALSAS', '$600')">SALSAS</div>
            <div class="side-btn btn-postres" onclick="op('POSTRES', '$1.500')">POSTRES</div>

            <div class="hud-card p-sandwich" onclick="op('SANDWICH', '$5.800')"><div class="name">SANDWICH</div><div class="price">$5.800</div></div>
            <div class="hud-card p-ensaladas" onclick="op('ENSALADAS', '$2.500')"><div class="name">ENSALADAS</div><div class="price">$2.500</div></div>
            <div class="hud-card p-papas" onclick="op('PAPAS FRITAS', '$2.000')"><div class="name">PAPAS</div><div class="price">$2.000</div></div>
        </div>
    </main>

    <div class="crio-chamber">
        <div class="crio-slot" onclick="op('QUILMES 1L', '$3.200')">
            <div class="crio-label uppercase">Fuel / Quilmes</div>
            <div class="crio-price">$3.200</div>
        </div>
        <div class="crio-slot" onclick="op('GASEOSA 1.5L', '$1.500')">
            <div class="crio-label uppercase">Energy / Soda</div>
            <div class="crio-price">$1.500</div>
        </div>
        <div class="crio-slot" onclick="op('VINO SELEC.', '$4.500')">
            <div class="crio-label uppercase">Core / Wine</div>
            <div class="crio-price">$4.500</div>
        </div>
    </div>

    <div id="push-up">
        <div class="close-x" onclick="cl()">✕</div>
        <h2 id="ht" class="text-xl font-black text-orange-500 italic uppercase mt-4">PRODUCTO</h2>
        <div id="hp" class="text-5xl font-black mt-6">$0.00</div>
        <button class="confirm-btn" onclick="cl()">Ignición de Pedido</button>
    </div>

    <nav>
        <div class="active">ENGINE</div>
        <div>RADAR</div>
        <div>LOGS</div>
    </nav>

    <script>
        function op(t, p) {
            document.getElementById('ht').innerText = t;
            document.getElementById('hp').innerText = p;
            document.getElementById('push-up').classList.add('active');
        }
        function cl() {
            document.getElementById('push-up').classList.remove('active');
        }
    </script>
</body>
</html>
