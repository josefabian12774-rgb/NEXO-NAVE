<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENU POMPÓN NAVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .circulo-central {
            width: 120px;
            height: 120px;
            border: 4px solid #dc2626;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            background: #18181b;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.4);
        }
    </style>
</head>
<body class="bg-black text-white p-4 font-sans">
    <header class="text-center py-4 border-b border-zinc-800">
        <h1 class="text-3xl font-black italic">POMPÓN <span class="text-red-600">NAVE</span></h1>
    </header>

    <div class="circulo-central">
        <span class="text-red-600 font-black text-xl italic text-center leading-none">NAVE<br><small class="text-white text-[10px]">MENU</small></span>
    </div>

    <div id="contenedor-menu" class="max-w-md mx-auto space-y-8">
        <p class="text-center text-zinc-600 italic">Cargando estructura visual...</p>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
