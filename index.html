<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POMPÓN NAVE - MENU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; font-family: 'sans-serif'; }
        .titulo-nave { font-style: italic; font-weight: 900; letter-spacing: -1px; }
        .reactor-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border: 2px solid #555;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(220,38,38,0.2) 0%, rgba(0,0,0,1) 70%);
            display: flex; align-items: center; justify-content: center;
        }
        .anillo-brillante {
            position: absolute;
            width: 110%; height: 110%;
            border: 3px solid #dc2626;
            border-radius: 50%;
            box-shadow: 0 0 20px #dc2626, inset 0 0 20px #dc2626;
            opacity: 0.6;
        }
        .tarjeta-plato {
            background: linear-gradient(145deg, #18181b, #09090b);
            border-left: 5px solid #dc2626;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="text-white p-4">
    <header class="text-center mb-4">
        <h1 class="text-4xl titulo-nave uppercase">POMPÓN <span class="text-red-600">NAVE</span></h1>
        <div class="h-1 w-full bg-gradient-to-r from-transparent via-red-600 to-transparent mt-2"></div>
    </header>

    <div class="reactor-container">
        <div class="anillo-brillante"></div>
        <img src="https://i.ibb.co/6R0n7Y0/pollo-reactor.png" alt="Reactor" class="w-32 z-10">
        <div class="absolute bottom-4 text-red-600 font-black tracking-widest text-xs">FLAVOR REACTOR</div>
    </div>

    <div id="contenedor-menu" class="max-w-md mx-auto space-y-8 pb-20">
        </div>
    <script type="module" src="app.js"></script>
</body>
</html>
