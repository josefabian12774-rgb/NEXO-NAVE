<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexo Nave | Central de Pedidos Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; min-height: 100vh; overflow: hidden; }
        
        @keyframes pulse-reactor {
            0% { box-shadow: 0 0 15px #ff6400; border-color: #ff6400; }
            50% { box-shadow: 0 0 40px #ff3300; border-color: #ff3300; }
            100% { box-shadow: 0 0 15px #ff6400; border-color: #ff6400; }
        }
        .reactor-core-active { animation: pulse-reactor 2s infinite ease-in-out; border: 3px solid #ff6400 !important; }

        .btn-vidrio-cian {
            background: rgba(0, 242, 255, 0.1); 
            color: #00f2ff; 
            font-weight: 900;
            text-transform: uppercase; 
            letter-spacing: 2px;
            border: 1px solid #00f2ff;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            transition: all 0.3s ease;
        }

        .btn-sala-control {
            background: rgba(255, 100, 0, 0.2);
            color: #ff6400;
            border: 1px solid #ff6400;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 100, 0, 0.3);
            cursor: pointer;
        }

        .pollo-holograma {
            width: 130%; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); mix-blend-mode: plus-lighter; display: none;
        }
        .pollo-holograma.visible { display: block; animation: hologram-float 4s infinite ease-in-out; }
        @keyframes hologram-float {
            0%, 100% { transform: translate(-50%, -50%) scale(1) translateY(0); }
            50% { transform: translate(-50%, -50%) scale(1.05) translateY(-10px); }
        }

        .silicio-modal {
            position: fixed; inset: 0; background: rgba(0, 5, 10, 0.98);
            backdrop-filter: blur(15px); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .silicio-modal.active { transform: translateY(0); }

        [v-cloak] { display: none; }
    </style>
</head>
<body class="flex justify-center items-center">
    <div id="app" v-cloak class="w-full max-w-lg h-screen flex flex-col items-center py-4 px-4 relative">
        
        <header class="text-center z-50 w-full relative">
            <div v-if="!sessionActiva" class="absolute top-0 left-0">
                <button @click="abrirSalaControl" class="btn-sala-control px-4 py-2 rounded-br-xl text-[10px]">SALA DE CONTROL</button>
            </div>

            <div class="absolute top-0 right-0 bg-zinc-900/80 border border-cyan-500/30 p-1 rounded flex flex-col items-center">
                <span class="text-[5px] text-cyan-400 uppercase font-black">Ciclos</span>
                <span id="visit-count" class="text-[10px] font-mono text-white">----</span>
            </div>

            <h1 @click="almiranteCheck" class="text-xl font-black tracking-[0.3em] text-orange-500 italic mb-2 cursor-pointer">NEXO NAVE</h1>
            
            <div class="h-14 flex items-center justify-center">
                <button v-if="pedido.length > 0" @click="verResumen = true" class="btn-vidrio-cian w-full max-w-xs py-3 rounded-xl text-xs animate-pulse">
                    CONFIRMAR ({{ pedido.length }})
                </button>
                <div v-else class="flex flex-col items-center">
                    <span class="text-[8px] uppercase tracking-[0.5em] text-zinc-600 font-bold">ESTADO: {{ sistemaIniciado ? 'OPERATIVO' : 'EN ESPERA' }}</span>
                </div>
            </div>
        </header>

        <div class="relative w-[320px] h-[320px] flex items-center justify-center mt-4">
            <div class="relative w-44 h-44 z-[1000] cursor-pointer rounded-full border-2 border-zinc-900 bg-black flex items-center justify-center overflow-hidden"
                 :class="{'reactor-core-active': sistemaIniciado}"
                 @click="handlePollo">
                <div class="relative w-full h-full">
                    <img :src="getURL('pollo-reactor.webp')" class="pollo-holograma" :class="{'visible': sistemaIniciado}">
                </div>
                <div v-if="!sistemaIniciado" class="absolute inset-0 flex flex-col items-center justify-center bg-orange-600/10 rounded-full">
                    <span class="text-orange-500 text-2xl font-black italic animate-pulse">ACTIVA</span>
                </div>
            </div>

            <div v-for="(p, i) in platos" :key="p.id" :style="getPos(i, platos.length, 125)" @click="abrirOpciones(p)"
                 class="absolute w-14 h-14 rounded-xl bg-black border border-white/10 overflow-hidden z-50 cursor-pointer shadow-2xl transition-all">
                <img :src="getURL(p.img)" class="w-full h-full object-cover" :class="{'grayscale opacity-30': !sistemaIniciado}">
                <p class="absolute bottom-0 w-full text-center text-[5px] font-black uppercase bg-black/90 py-1 text-orange-500">{{p.label}}</p>
            </div>
        </div>

        <div class="silicio-modal" :class="{'active': panelRegistro}">
            <div v-if="pasoRegistro === 0" class="w-full max-w-sm p-8 text-center">
                <h2 class="text-orange-500 text-xl font-black mb-8 italic uppercase tracking-widest">SALA DE CONTROL</h2>
                <div class="space-y-4">
                    <button @click="seleccionarPlan('fantasma')" class="w-full p-4 border border-zinc-700 bg-zinc-900/50 text-left active:bg-orange-500/20">
                        <p class="text-orange-500 font-black text-xs uppercase">1. Modo Fantasma</p>
                        <p class="text-[7px] text-zinc-500 uppercase">Acceso inmediato 24hs (Sin ADN)</p>
                    </button>
                    <button @click="seleccionarPlan('prueba')" class="w-full p-4 border border-cyan-500/50 bg-cyan-950/20 text-left active:bg-cyan-500/20">
                        <p class="text-cyan-400 font-black text-xs uppercase">2. Ciclo de Prueba</p>
                        <p class="text-[7px] text-zinc-400 uppercase">20 Días de acceso con ADN</p>
                    </button>
                    <button @click="seleccionarPlan('premium')" class="w-full p-4 border border-yellow-600/50 bg-yellow-900/10 text-left opacity-60">
                        <p class="text-yellow-500 font-black text-xs uppercase">3. Plan Comando</p>
                        <p class="text-[7px] text-zinc-500 uppercase">Adquirir Licencia (Próximamente)</p>
                    </button>
                </div>
                <button @click="panelRegistro = false" class="mt-10 text-[9px] text-zinc-600 font-black uppercase border-b border-zinc-800">Cerrar Sistema</button>
            </div>

            <div v-if="pasoRegistro === 1" class="w-full max-w-sm p-8 text-center">
                <h2 class="text-orange-500 text-xl font-black mb-6 italic uppercase">Contrato Nexo</h2>
                <div class="text-[8px] text-left text-zinc-400 space-y-3 mb-8 uppercase tracking-widest leading-relaxed">
                    <p v-for="p in pilares">🔹 {{p}}</p>
                </div>
                <button @click="pasoRegistro = 2" class="btn-vidrio-cian w-full py-5 text-sm">ACEPTAR Y CONTINUAR</button>
                <button @click="pasoRegistro = 0" class="mt-6 text-[8px] text-zinc-600 uppercase">Volver</button>
            </div>

            <div v-if="pasoRegistro === 2" class="w-full max-w-sm p-8 text-center">
                <h2 class="text-cyan-400 text-xl font-black mb-6 uppercase tracking-widest">Vincular ADN</h2>
                <div class="space-y-4 mb-8">
                    <input v-model="formADN.wa" type="tel" placeholder="NUMERO WHATSAPP" class="bg-black border border-zinc-800 p-4 w-full text-cyan-400 text-center text-xs font-black outline-none focus:border-cyan-500">
                    <input v-model="formADN.dni" type="text" placeholder="DNI / CUIT" class="bg-black border border-zinc-800 p-4 w-full text-cyan-400 text-center text-xs font-black outline-none focus:border-cyan-500">
                </div>
                <button @click="consolidarUnidad" class="btn-vidrio-cian w-full py-5 text-sm">SINCRONIZAR IDENTIDAD</button>
            </div>
        </div>

        <div class="mt-auto mb-6 w-full grid grid-cols-4 gap-2 h-24">
            <div v-for="b in bebidas" :key="b.id" @click="abrirOpciones(b)" class="border border-zinc-900 rounded-lg overflow-hidden relative cursor-pointer bg-zinc-900/50">
                <img :src="getURL(b.img)" class="w-full h-full object-cover opacity-40">
                <div class="absolute inset-0 flex items-end justify-center p-1">
                    <span class="text-[7px] font-black text-orange-500 uppercase">{{b.label}}</span>
                </div>
            </div>
            <div class="relative" @click="toggleVideoAudio">
                <div v-if="sistemaIniciado" class="monitor-video">
                    <video id="adVideo" loop muted playsinline autoplay class="w-full h-full object-cover">
                        <source src="grok_video_2026-03-15-16-48-07.mp4" type="video/mp4">
                    </video>
                </div>
                <div v-else class="w-full h-full bg-zinc-900/30 border border-zinc-800 rounded-lg flex items-center justify-center">
                    <span class="text-zinc-800 text-[6px] font-black uppercase tracking-tighter">Radar Off</span>
                </div>
            </div>
        </div>

        <div class="silicio-modal" :class="{'active': panelOpciones}">
            <div v-if="itemActual" class="w-full flex flex-col items-center p-8">
                <h2 class="text-cyan-400 text-2xl font-black uppercase mb-6">{{itemActual.label}}</h2>
                <button v-for="v in itemActual.variedades" @click="agregarAlPedido(v)" class="btn-vidrio-cian w-full max-w-xs py-4 mb-3 text-xs">+ {{ v }}</button>
                <button @click="panelOpciones = false" class="mt-6 text-zinc-500 text-[10px] uppercase font-bold">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    base: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public',
                    sistemaIniciado: false,
                    panelOpciones: false,
                    panelRegistro: false,
                    pasoRegistro: 0,
                    sessionActiva: localStorage.getItem('nexo_consolidado') === 'true',
                    formADN: { wa: '', dni: '' },
                    pilares: ["Propiedad Nexo", "Ciclo 30 días", "Identidad WA/DNI", "Responsabilidad Cliente", "Protocolo Anchored", "Jurisdicción TDF"],
                    itemActual: null,
                    pedido: [],
                    platos: [
                        { id: 1, img: 'asado-escolta.webp', label: 'Asado', variedades: ['Tira', 'Vacío'] },
                        { id: 2, img: 'milanga-soberana.webp', label: 'Milanesa', variedades: ['Napolitana', 'Sola'] },
                        { id: 3, img: 'empanada-escuadron.webp', label: 'Empanadas', variedades: ['Carne', 'Pollo'] },
                        { id: 4, img: 'pizza-core.webp', label: 'Pizza', variedades: ['Muzza', 'Especial'] },
                        { id: 5, img: 'flan-casero-nexo.webp', label: 'Postre', variedades: ['Flan', 'Budín'] },
                        { id: 6, img: 'papas-mega-reactor.webp', label: 'Papas', variedades: ['Cheddar', 'Provenzal'] }
                    ],
                    bebidas: [
                        { id: 7, img: 'birra-cryo-amber.webp', label: 'Birra', variedades: ['IPA', 'Rubia'] },
                        { id: 8, img: 'cava-tinto-premium.webp', label: 'Vino', variedades: ['Malbec', 'Blanco'] },
                        { id: 9, img: 'soda-lemon-reactor.webp', label: 'Soda', variedades: ['Coca', 'Soda'] }
                    ],
                    especialPollo: { label: 'Pollo Reactor', variedades: ['Entero', 'Medio', 'Cuarto'] }
                }
            },
            methods: {
                getURL(n) { return `${this.base}/${n}`; },
                getPos(i, total, radius) {
                    const angle = (i * (360 / total) - 90) * (Math.PI / 180);
                    return `transform: translate(${Math.cos(angle)*radius}px, ${Math.sin(angle)*radius}px)`;
                },
                abrirSalaControl() {
                    this.pasoRegistro = 0;
                    this.panelRegistro = true;
                },
                seleccionarPlan(tipo) {
                    if(tipo === 'fantasma') {
                        localStorage.setItem('nexo_h_fantasma', new Date().toISOString());
                        this.panelRegistro = false;
                        alert("MODO FANTASMA ACTIVADO POR 24HS");
                    } else if(tipo === 'prueba') {
                        this.pasoRegistro = 1; // Salta al contrato
                    }
                },
                consolidarUnidad() {
                    if(this.formADN.wa && this.formADN.dni) {
                        localStorage.setItem('nexo_consolidado', 'true');
                        localStorage.setItem('nexo_adn', JSON.stringify(this.formADN));
                        this.sessionActiva = true;
                        this.panelRegistro = false;
                        alert("UNIDAD CONSOLIDADA CON ÉXITO");
                    } else {
                        alert("FALTA ADN");
                    }
                },
                handlePollo() {
                    if (!this.sistemaIniciado) { this.sistemaIniciado = true; } 
                    else { this.abrirOpciones(this.especialPollo); }
                },
                abrirOpciones(item) {
                    if (!this.sistemaIniciado) return;
                    this.itemActual = item;
                    this.panelOpciones = true;
                },
                agregarAlPedido(v) {
                    this.pedido.push({ nombre: this.itemActual.label, variedad: v });
                    this.panelOpciones = false;
                },
                almiranteCheck() {
                    if(prompt("CÓDIGO ALMIRANTE") === "051112182129jsm13818") {
                        localStorage.setItem('nexo_consolidado', 'true');
                        location.reload();
                    }
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
