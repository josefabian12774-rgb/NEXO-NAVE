<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO NAVE - FLAVOR REACTOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body { 
            background: radial-gradient(circle at center, #1a0800 0%, #000 100%); 
            color: #fff; font-family: 'Orbitron', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; 
        }

        /* EFECTO DE LENTE Y BRILLO HUD */
        .hud-vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.8) 100%);
            pointer-events: none; z-index: 50;
        }

        /* REACTOR CENTRAL MECÁNICO */
        .reactor-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px;
        }

        .ring-glow {
            position: absolute; inset: 0;
            border: 4px solid transparent; border-top: 4px solid #ff6a00; border-bottom: 4px solid #ff6a00;
            border-radius: 50%; animation: rotate 4s linear infinite;
            filter: drop-shadow(0 0 15px #ff4500);
        }

        .ring-inner {
            position: absolute; inset: 20px;
            border: 15px solid #1a1a1a; border-radius: 50%;
            box-shadow: inset 0 0 30px #000, 0 0 20px rgba(255,106,0,0.4);
            display: flex; align-items: center; justify-content: center;
            background: rgba(20,5,0,0.6);
        }

        .main-asset { 
            width: 130px; filter: drop-shadow(0 0 25px #ff4500); 
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* TARJETAS HUD (Respetando la foto exacta) */
        .hud-card {
            position: absolute; width: 140px; 
            background: rgba(0,0,0,0.8); border: 1px solid #333;
            border-left: 4px solid #ff4500; padding: 10px;
            clip-path: polygon(0 0, 90% 0, 100% 20%, 100% 100%, 0 100%);
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.2);
        }

        /* Posiciones alrededor del reactor */
        .pos-tl { top: -30px; left: -90px; }  /* EMPANADAS */
        .pos-tr { top: -30px; right: -90px; } /* SIDES */
        .pos-bl { bottom: -30px; left: -90px; } /* PIZZAS */
        .pos-br { bottom: -30px; right: -90px; } /* DIPS */

        .label { font-size: 7px; color: #ffae00; letter-spacing: 2px; font-weight: 900; }
        .name { font-size: 9px; font-weight: 900; margin: 2px 0; text-transform: uppercase; }
        .price { color: #ffcc00; font-size: 14px; font-weight: 900; font-style: italic; }

        /* SECCIÓN COMBUSTIBLE (BEBIDAS) */
        .fuel-matrix {
            position: fixed; bottom: 80px; width: 100%;
            display: flex; justify-content: center; gap: 15px;
        }
        .fuel-cell {
            width: 70px; height: 40px; border: 1px solid #444;
            position: relative; background: #0a0a0a; overflow: hidden;
        }
        .fuel-bar {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(0deg, #900, #ff4500);
            animation: charge 3s infinite ease-in-out;
        }
        .fuel-val {
            position: absolute; inset: 0; display: flex; 
            align-items: center; justify-content: center;
            font-size: 9px; font-weight: 900;
        }

        @keyframes charge { 0%, 100% { height: 20%; } 50% { height: 80%; } }

        nav {
            position: fixed; bottom: 0; width: 100%;
            display: flex; justify-content: space-around; padding: 25px;
            background: #000; border-top: 1px solid #222;
            font-size: 10px; color: #666; font-weight: 900;
        }
        .active { color: #ff4500; text-shadow: 0 0 10px #ff4500; }
    </style>
</head>
<body>
    <div class="hud-vignette"></div>

    <header class="p-6 text-center relative z-10">
        <h1 class="text-2xl font-black italic tracking-tighter">POMPÓN <span class="text-orange-600">NAVE</span></h1>
        <p class="text-[7px] text-zinc-500 tracking-[5px] mt-1">ROTISSERIE COMMAND 2.0</p>
    </header>

    <div class="reactor-container">
        <div class="ring-glow"></div>
        <div class="ring-inner">
            <img src="https://i.ibb.co/6R0n7Y0/pollo-reactor.png" class="main-asset" alt="REACTOR CORE">
        </div>

        <div class="hud-card pos-tl">
            <div class="label">SEC: EMPANADAS</div>
            <div class="name">DOCENA MIXTA</div>
            <div class="price">$8.000</div>
        </div>
        <div class="hud-card pos-tr">
            <div class="label">SEC: SIDES</div>
            <div class="name">PAPAS RÚSTICAS</div>
            <div class="price">$2.500</div>
        </div>
        <div class="hud-card pos-bl">
            <div class="hud-sector">SEC: PIZZAS</div>
            <div class="name">MUZZA NAVE</div>
            <div class="price">$4.200</div>
        </div>
        <div class="hud-card pos-br">
            <div class="label">SEC: DIPS</div>
            <div class="name">GARLIC AIOLI</div>
            <div class="price">$600</div>
        </div>
    </div>

    <div class="fuel-matrix">
        <div class="fuel-cell">
            <div class="fuel-bar" style="animation-delay: 0s;"></div>
            <div class="fuel-val">QUILMES</div>
        </div>
        <div class="fuel-cell">
            <div class="fuel-bar" style="animation-delay: 0.5s;"></div>
            <div class="fuel-val">GASEOSA</div>
        </div>
        <div class="fuel-cell">
            <div class="fuel-bar" style="animation-delay: 1s;"></div>
            <div class="fuel-val">VINO</div>
        </div>
    </div>

    <nav>
        <div class="active">FUEL UP</div>
        <div>EXPLORE</div>
        <div>MY CORE</div>
        <div>SUPPLY</div>
    </nav>
</body>
</html>
