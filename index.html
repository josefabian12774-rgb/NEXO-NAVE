<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POMPÓN NAVE MOBILE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000;
            background-image: radial-gradient(circle at center, #2b0d02 0%, #000 100%);
            color: #fff; font-family: 'Share Tech Mono', monospace;
            height: 100vh; width: 100vw; margin: 0; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* OVERLAY DE ESCANEO */
        .hud-scan {
            position: fixed; inset: 0; pointer-events: none; z-index: 100;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(255, 69, 0, 0.05) 2px);
        }

        /* HEADER COMPACTO PARA CELULAR */
        header {
            padding: 15px; text-align: center; border-bottom: 1px solid #333;
            background: rgba(10,10,10,0.95); z-index: 50;
        }
        .titulo { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 900; font-style: italic; }
        .titulo span { color: #ff3c00; text-shadow: 0 0 10px #ff3c00; }

        /* CONTENEDOR PRINCIPAL MOBILE */
        main { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }

        /* REACTOR CENTRAL ESCALADO PARA CELULAR */
        .reactor-wrap {
            position: relative; width: 240px; height: 240px;
        }

        .ring-fire {
            position: absolute; inset: 0;
            border: 3px solid transparent; border-top: 3px solid #ff4500; border-bottom: 3px solid #ff4500;
            border-radius: 50%; animation: spin 4s linear infinite;
            filter: drop-shadow(0 0 15px #ff4500);
        }

        .inner-chassis {
            position: absolute; inset: 20px;
            background: rgba(15, 15, 15, 0.95);
            border: 6px solid #1a1a1a; border-radius: 50%;
            box-shadow: inset 0 0 40px #000, 0 0 20px rgba(255, 69, 0, 0.5);
            display: flex; align-items: center; justify-content: center;
        }

        .img-core { width: 110px; filter: drop-shadow(0 0 20px #ff4500); animation: pulse 2s infinite ease-in-out; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* TARJETAS HUD MOBILE (Posicionamiento adaptativo) */
        .hud-card {
            position: absolute; width: 120px;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 69, 0, 0.2); border-left: 4px solid #ff3c00;
            padding: 8px; clip-path: polygon(0 0, 85% 0, 100% 20%, 100% 100%, 0 100%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.8); z-index: 20;
        }

        /* Coordenadas para que no se salgan de la pantalla del cel */
        .c-tl { top: -45px; left: -40px; }
        .c-tr { top: -45px; right: -40px; }
        .c-bl { bottom: -45px; left: -40px; }
        .c-br { bottom: -45px; right: -40px; }

        .tag { font-size: 6px; color: #ffae00; font-weight: 900; letter-spacing: 1px; }
        .name { font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 900; margin: 2px 0; text-transform: uppercase; }
        .price { color: #ffcc00; font-size: 14px; font-weight: 900; font-style: italic; }

        /* HELADERA DE CRIO-STASIS (Bebidas) */
        .crio-chamber {
            height: 100px; padding: 10px; display: flex; justify-content: center; gap: 10px;
            background: linear-gradient(0deg, #0a0a0a 0%, transparent 100%);
            z-index: 60;
        }

        .crio-slot {
            flex: 1; max-width: 80px; border: 1px solid #333; background: #050505;
            position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end;
            padding: 5px; text-align: center; box-shadow: inset 0 0 10px #ff4500;
        }

        .crio-bar {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(0deg, #600, #ff4500);
            animation: level 3s infinite alternate; opacity: 0.6;
        }

        @keyframes level { from { height: 20%; } to { height: 80%; } }

        .crio-label { font-size: 6px; position: relative; z-index: 2; color: #aaa; }
        .crio-val { font-size: 10px; position: relative; z-index: 2; font-weight: 900; color: #fff; }

        /* NAV MOBILE */
        nav {
            display: flex; justify-content: space-around; padding: 15px;
            background: #000; border-top: 1px solid #222; font-size: 10px;
        }
        .active { color: #ff3c00; text-shadow: 0 0 10px #ff3c00; font-weight: 900; }
    </style>
</head>
<body>
    <div class="hud-scan"></div>

    <header>
        <div class="titulo">POMPÓN <span>NAVE</span></div>
        <div class="text-[7px] text-zinc-500 tracking-[4px]">MOBILE COMMAND TERMINAL</div>
    </header>

    <main>
        <div class="reactor-wrap">
            <div class="ring-fire"></div>
            <div class="inner-chassis">
                <img src="https://i.ibb.co/6R0n7Y0/pollo-reactor.png" class="img-core" alt="POLLO">
            </div>

            <div class="hud-card c-tl">
                <div class="tag">SEC: PARRILLA</div>
                <div class="name">PARRILLADA</div>
                <div class="price">$12.500</div>
            </div>

            <div class="hud-card c-tr">
                <div class="tag">SEC: SANDWICH</div>
                <div class="name">MILANESA</div>
                <div class="price">$5.800</div>
            </div>

            <div class="hud-card c-bl">
                <div class="tag">SEC: MASAS</div>
                <div class="name">EMPANADAS</div>
                <div class="price">$8.000</div>
            </div>

            <div class="hud-card c-br">
                <div class="tag">SEC: EXTRAS</div>
                <div class="name">DIPS</div>
                <div class="price">$600</div>
            </div>
        </div>
    </main>

    <div class="crio-chamber">
        <div class="crio-slot">
            <div class="crio-bar" style="animation-delay: 0s;"></div>
            <div class="crio-label">QUILMES</div>
            <div class="crio-val">$3.200</div>
        </div>
        <div class="crio-slot">
            <div class="crio-bar" style="animation-delay: 0.5s;"></div>
            <div class="crio-label">GASEOSA</div>
            <div class="crio-val">$1.500</div>
        </div>
        <div class="crio-slot">
            <div class="crio-bar" style="animation-delay: 1s;"></div>
            <div class="crio-label">VINO</div>
            <div class="crio-val">$4.500</div>
        </div>
    </div>

    <nav>
        <div class="active">FUEL</div>
        <div>ORBIT</div>
        <div>PILOT</div>
        <div>SUPPLY</div>
    </nav>
</body>
</html>
