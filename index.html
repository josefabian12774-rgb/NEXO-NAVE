<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Arquetipo | Flavor Reactor 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; min-height: 100vh; overflow: hidden; }
        
        /* 1. Animación de Carga (Flicker) */
        @keyframes scanline { 0% { opacity: 0; transform: scale(0.9); } 50% { opacity: 0.5; } 100% { opacity: 1; transform: scale(1); } }
        .app-load { animation: scanline 0.8s ease-out; }

        /* 2. Glow Dinámico del Núcleo */
        @keyframes pulse-heat {
            0% { box-shadow: 0 0 20px #ff6400; transform: scale(1); }
            50% { box-shadow: 0 0 50px #ff3300; transform: scale(1.02); }
            100% { box-shadow: 0 0 20px #ff6400; transform: scale(1); }
        }
        .reactor-core { border: 2px solid #ff6400; animation: pulse-heat 3s infinite ease-in-out; background: #000; cursor: pointer; }

        .orbit-btn { transition: all 0.3s; border: 1px solid rgba(255,255,255,0.1); background: #0a0a0a; overflow: hidden; }
        .orbit-btn:hover { border-color: #ff6400; transform: scale(1.2); z-index: 50; }
        
        .fridge-unit { border: 1px solid #222; background: linear-gradient(180deg, #111 0%, #000 100%); transition: all 0.3s; cursor: pointer; }
        .fridge-unit:hover { border-color: #ff6400; transform: translateY(-5px); }

        .glow-text { text-shadow: 0 0 10px #ff6400; }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="flex justify-center items-center">
    <div id="app" v-cloak class="app-load w-full max-w-lg h-screen flex flex-col items-center py-6 px-4 relative">
        
        <audio id="snd-ambient" loop src="https://www.soundjay.com/transportation/subway-train-hum-1.mp3" volume="0.2"></audio>
        <audio id="snd-click" src="https://www.soundjay.com/buttons/button-29.mp3"></audio>

        <header class="text-center mb-2 z-40">
            <h1 class="text-xl font-black tracking-[0.2em] text-orange-500 glow-text italic">NEXO NAVE</h1>
            <p class="text-[7px] tracking-[0.4em] text-zinc-500 uppercase">Status: Operational</p>
        </header>

        <div class="relative w-[340px] h-[340px] flex items-center justify-center mt-10">
            <div class="absolute inset-0 border border-orange-500/10 rounded-full animate-[spin_60s_linear_infinite]"></div>
            
            <div @click="abrir({label: 'Pollo Reactor', img: 'pollo-reactor.webp'})" class="w-32 h-32 rounded-full overflow-hidden reactor-core z-10">
                <img :src="getURL('pollo-reactor.webp')" class="w-full h-full object-cover">
            </div>

            <div v-for="(item, index) in platos" :key="item.id" 
                 :style="getPos(index, platos.length, 120)"
                 @click="abrir(item)"
                 class="absolute w-16 h-16 rounded-xl orbit-btn z-20 shadow-2xl">
                <img :src="getURL(item.img)" class="w-full h-full object-cover">
                <p class="absolute bottom-1 w-full text-center text-[5px] font-bold uppercase tracking-tighter bg-black/60">{{item.label}}</p>
            </div>
        </div>

        <div class="mt-auto mb-10 w-full max-w-xs space-y-4">
            <div class="grid grid-cols-3 gap-3">
                <div v-for="bev in bebidas" :key="bev.id" @click="abrir(bev)" class="fridge-unit aspect-[3/4] rounded-lg overflow-hidden relative group border-t-2 border-orange-600/40">
                    <img :src="getURL(bev.img)" class="w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 flex flex-col justify-end p-2 bg-gradient-to-t from-black">
                        <span class="text-[6px] font-black uppercase text-orange-500 text-center">{{bev.label}}</span>
                    </div>
                </div>
            </div>
        </div>

        <div v-if="modal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-6">
            <div class="bg-zinc-950 border border-orange-600/40 p-8 w-full max-w-xs rounded-xl text-center shadow-[0_0_50px_rgba(255,100,0,0.2)]">
                <h2 class="text-orange-500 text-lg font-black uppercase italic glow-text">{{seleccionada.label}}</h2>
                <div class="h-px bg-zinc-800 w-full my-4"></div>
                <p class="text-zinc-500 text-[10px] mb-6 font-mono uppercase">Unidad lista para despacho.</p>
                
                <div class="flex flex-col gap-2">
                    <button @click="pedirWhatsApp" class="w-full py-3 bg-orange-600 text-black font-black text-[10px] tracking-widest uppercase hover:bg-orange-400">
                        Confirmar Pedido (WhatsApp)
                    </button>
                    <button @click="modal = false" class="text-zinc-600 text-[8px] uppercase tracking-widest mt-2">Abortar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    base: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public',
                    modal: false,
                    seleccionada: null,
                    ambientStarted: false,
                    platos: [
                        { id: 1, img: 'asado-escolta.webp', label: 'Asado' },
                        { id: 2, img: 'milanga-soberana.webp', label: 'Milanga' },
                        { id: 3, img: 'empanada-escuadron.webp', label: 'Empanada' },
                        { id: 4, img: 'pizza-core.webp', label: 'Pizzas' },
                        { id: 5, img: 'flan-casero-nexo.webp', label: 'Postre' },
                        { id: 6, img: 'papas-mega-reactor.webp', label: 'Papas' },
                        { id: 10, img: 'mixta-organica.webp', label: 'Ensalada' }
                    ],
                    bebidas: [
                        { id: 7, img: 'birra-cryo-amber.webp', label: 'Cerveza' },
                        { id: 8, img: 'cava-tinto-premium.webp', label: 'Cava' },
                        { id: 9, img: 'soda-lemon-reactor.webp', label: 'Gaseosa' }
                    ]
                }
            },
            methods: {
                getURL(n) { return `${this.base}/${n}`; },
                getPos(i, total, radius) {
                    const angle = (i * (360 / total) - 90) * (Math.PI / 180);
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    return `transform: translate(${x}px, ${y}px)`;
                },
                abrir(item) {
                    this.seleccionada = item;
                    this.modal = true;
                    this.playClick();
                    if(!this.ambientStarted) this.startAmbient();
                },
                playClick() { document.getElementById('snd-click').play(); },
                startAmbient() {
                    const amb = document.getElementById('snd-ambient');
                    amb.volume = 0.1;
                    amb.play();
                    this.ambientStarted = true;
                },
                pedirWhatsApp() {
                    const num = "5491123456789"; // CAMBIÁ ESTO POR TU NÚMERO REAL
                    const msg = encodeURIComponent(`🚀 ¡Hola Nexo Nave! Quiero pedir una unidad de: ${this.seleccionada.label}. ¡Espero coordenadas!`);
                    window.open(`https://wa.me/${num}?text=${msg}`, '_blank');
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
