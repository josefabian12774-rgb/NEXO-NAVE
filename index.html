
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Arquetipo | Flavor Reactor 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); color: #fff; font-family: 'Orbitron', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .reactor-core { border: 2px solid #ff6400; box-shadow: 0 0 20px rgba(255, 100, 0, 0.4); cursor: pointer; transition: all 0.3s; background: #000; }
        .reactor-core:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(255, 100, 0, 0.7); }
        .orbit-btn { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.1); background: #0a0a0a; }
        .orbit-btn:hover { border-color: #ff6400; box-shadow: 0 0 15px rgba(255, 100, 0, 0.5); z-index: 50; }
        .fridge-unit { border: 1px solid #333; background: linear-gradient(180deg, #111 0%, #000 100%); transition: all 0.3s; }
        .fridge-unit:hover { border-color: #ff6400; transform: translateY(-5px); }
        .glow-text { text-shadow: 0 0 10px #ff6400; }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="flex flex-col items-center">
    <div id="app" v-cloak class="w-full max-w-lg flex flex-col items-center py-6 px-4">
        
        <header class="text-center mb-4">
            <h1 class="text-xl font-black tracking-[0.2em] text-orange-500 glow-text italic uppercase">FLAVOR REACTOR 2.0</h1>
            <p class="text-[7px] tracking-[0.4em] text-zinc-500 uppercase">Nexo Arquetipo Core</p>
        </header>

        <div class="relative w-[280px] h-[280px] flex items-center justify-center mt-4">
            <div class="absolute inset-0 border border-orange-500/10 rounded-full animate-[spin_60s_linear_infinite]"></div>
            
            <div @click="abrir({label: 'Nexo Core', img: 'pollo-reactor.webp'})" 
                 class="w-24 h-24 rounded-full overflow-hidden reactor-core z-10">
                <img :src="getURL('pollo-reactor.webp')" class="w-full h-full object-cover">
            </div>

            <div v-for="(item, index) in platos" :key="item.id" 
                 :style="getPos(index, platos.length, 105)"
                 @click="abrir(item)"
                 class="absolute w-14 h-14 rounded-xl overflow-hidden orbit-btn z-20 shadow-xl">
                <img :src="getURL(item.img)" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all">
                <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent opacity-60"></div>
                <p class="absolute bottom-1 w-full text-center text-[5px] font-bold uppercase tracking-tighter">{{item.label}}</p>
            </div>
        </div>

        <div class="mt-16 w-full max-w-xs space-y-4">
            <p class="text-[7px] tracking-[0.3em] text-orange-500/60 uppercase text-center font-bold italic">Unidades de Suministro Líquido</p>
            <div class="grid grid-cols-3 gap-3">
                <div v-for="bev in bebidas" :key="bev.id" 
                     @click="abrir(bev)"
                     class="fridge-unit aspect-[3/4] rounded-lg overflow-hidden relative group cursor-pointer border-t-2 border-orange-600/40">
                    <img :src="getURL(bev.img)" class="w-full h-full object-cover opacity-40 group-hover:opacity-100 transition-opacity">
                    <div class="absolute inset-0 flex flex-col justify-end p-2 bg-gradient-to-t from-black to-transparent">
                        <span class="text-[6px] font-black uppercase text-orange-500 text-center leading-none tracking-tighter">{{bev.label}}</span>
                    </div>
                </div>
            </div>
        </div>

        <div v-if="modal" @click="modal = false" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-6">
            <div class="bg-zinc-950 border border-orange-600/40 p-8 w-full max-w-xs rounded-xl shadow-2xl">
                <h2 class="text-orange-500 text-lg font-black mb-1 uppercase tracking-tighter italic glow-text">> {{seleccionada.label}}</h2>
                <div class="h-px bg-zinc-800 w-full mb-4"></div>
                <p class="text-zinc-500 text-[9px] leading-relaxed mb-6 font-mono">STATUS: OPERATIONAL<br>REGION: RIO GRANDE</p>
                <button class="w-full py-3 bg-orange-600 text-black font-black text-[10px] tracking-widest hover:bg-orange-400 uppercase">Confirmar Pedido</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    // URL CORREGIDA SEGÚN TUS CAPTURAS (Bucket: imagenes, ID: qcsh)
                    base: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public',
                    modal: false,
                    seleccionada: null,
                    platos: [
                        { id: 1, img: 'asado-escolta.webp', label: 'Asado' },
                        { id: 2, img: 'milanga-soberana.webp', label: 'Milanga' },
                        { id: 3, img: 'empanada-escuadron.webp', label: 'Empanada' },
                        { id: 4, img: 'pizza-core.webp', label: 'Pizzas' },
                        { id: 5, img: 'flan-casero-nexo.webp', label: 'Postre' },
                        { id: 6, img: 'papas-mega-reactor.webp', label: 'Papas' }
                    ],
                    bebidas: [
                        { id: 7, img: 'birra-cryo-amber.webp', label: 'Cerveza' },
                        { id: 8, img: 'cava-tinto-premium.webp', label: 'Vinos' },
                        { id: 9, img: 'soda-lemon-reactor.webp', label: 'Bebidas' }
                    ]
                }
            },
            methods: {
                getURL(n) { return `${this.base}/${n}`; },
                getPos(i, total, radius) {
                    const angle = (i * (360 / total) - 90) * (Math.PI / 180);
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    return `transform: translate(${x}px, ${y}px)`;
                },
                abrir(item) { this.seleccionada = item; this.modal = true; }
            }
        }).mount('#app')
    </script>
</body>
</html>
