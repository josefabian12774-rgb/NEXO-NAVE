<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POMPÓN NAVE v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* FONDO TECNOLÓGICO */
        .bg-tech { position: fixed; inset: 0; background: radial-gradient(circle at center, #200, #000); z-index: -1; }

        /* REACTOR CENTRAL */
        .reactor-box { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 280px; }
        
        .anillo-fuego {
            position: absolute; inset: 0; border: 4px solid transparent;
            border-top: 4px solid #ff4500; border-bottom: 4px solid #ff4500;
            border-radius: 50%; animation: spin 3s linear infinite;
            filter: drop-shadow(0 0 15px #ff4500);
        }
        
        .anillo-metal {
            position: absolute; inset: 20px; border: 8px solid #222;
            border-radius: 50%; box-shadow: inset 0 0 20px #000, 0 0 10px #444;
            display: flex; align-items: center; justify-content: center;
        }

        .pollo-core { width: 100px; height: 100px; background: url('https://i.ibb.co/6R0n7Y0/pollo-reactor.png') no-repeat center; background-size: contain; filter: drop-shadow(0 0 20px #ff4500); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* TARJETAS HUD */
        .hud-card {
            position: absolute; width: 150px; background: rgba(0,0,0,0.8);
            border: 1px solid #444; border-left: 4px solid #ff4500;
            padding: 10px; clip-path: polygon(0 0, 90% 0, 100% 20%, 100% 100%, 0 100%);
        }
        
        .pos-1 { top: -20px; left: -100px; } /* Empanadas */
        .pos-2 { bottom: -20px; left: -100px; } /* Pizzas */
        .pos-3 { top: -20px; right: -100px; } /* Platos */
        .pos-4 { bottom: -20px; right: -100px; } /* Bebidas */

        .label { font-size: 8px; color: #888; text-transform: uppercase; }
        .name { font-size: 10px; font-weight: 900; margin: 2px 0; }
        .price { color: #ffcc00; font-size: 14px; font-weight: 900; font-style: italic; }

        /* NAVBAR */
        nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px; background: #050505; border-top: 1px solid #222; font-size: 10px; }
        .active { color: #ff4500; text-shadow: 0 0 8px #ff4500; }
    </style>
</head>
<body>
    <div class="bg-tech"></div>
    
    <header class="text-center p-6">
        <h1 class="text-2xl font-black italic tracking-tighter">POMPÓN <span class="text-red-600">NAVE</span></h1>
    </header>

    <div class="reactor-box">
        <div class="anillo-fuego"></div>
        <div class="anillo-metal">
            <div class="pollo-core"></div>
        </div>

        <div class="hud-card pos-1">
            <div class="label">Sector: Empanadas</div>
            <div class="name">DOCENA MIXTA</div>
            <div class="price">$8000</div>
        </div>

        <div class="hud-card pos-2">
            <div class="label">Sector: Pizzas</div>
            <div class="name">MUZZA NAVE</div>
            <div class="price">$4200</div>
        </div>

        <div class="hud-card pos-3">
            <div class="label">Sector: Platos</div>
            <div class="name">POLLO PARRILLA</div>
            <div class="price">$5500</div>
        </div>

        <div class="hud-card pos-4">
            <div class="label">Sector: Bebidas</div>
            <div class="name">CERVEZA 1L</div>
            <div class="price">$3200</div>
        </div>
    </div>

    <nav>
        <div class="active">IGNITION</div>
        <div>ORBIT</div>
        <div>PILOT</div>
        <div>SUPPLY</div>
    </nav>
</body>
</html>
