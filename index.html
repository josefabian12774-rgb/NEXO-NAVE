<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXO-NAVE | ORIGINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            height: 100dvh; width: 100vw; margin: 0; padding: 0; 
            overflow: hidden; background: #000; color: white;
            font-family: 'Oswald', sans-serif;
        }
        /* Volvemos al fondo original de la Nave */
        .bg-nave {
            background-color: #000;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            background-size: cover; height: 100dvh; display: flex; flex-direction: column;
        }
        .font-marker { font-family: 'Permanent Marker', cursive; color: #facc15; }
        
        /* NEXOSTATICAD: Integración en el carril derecho sin romper lo anterior */
        #nexo-video-carril {
            position: fixed;
            bottom: 20px; 
            right: 12px; 
            width: 26vw;
            max-width: 95px;
            aspect-ratio: 9/16;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(250, 204, 21, 0.3);
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            z-index: 100;
            display: none;
        }

        /* Tus controles originales recortados al 70% */
        .footer-controls { width: 68%; display: flex; flex-direction: column; gap: 8px; }

        .btn-original {
            background: #facc15; color: black;
            border-radius: 12px; padding: 12px 4px; text-align: center;
            font-weight: 900; text-transform: uppercase; cursor: pointer; flex: 1;
        }
        
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-nave">
    <div id="app" v-cloak class="flex flex-col h-full p-4 pt-2">
        
        <div id="nexo-video-carril" @click="toggleAudio">
            <video id="adVideo" loop muted playsinline autoplay style="width: 100%; height: 100%; object-fit: cover;">
                <source src="grok_video_2026-03-15-16-48-07.mp4" type="video/mp4">
            </video>
        </div>

        <header class="flex justify-between items-center h-[10%]">
            <div class="bg-zinc-900 w-10 h-10 rounded-xl flex items-center justify-center text-lg">🛰️</div>
            <h1 class="font-marker text-2xl italic uppercase tracking-tighter">NEXO NAVE</h1>
            <div class="bg-zinc-900 w-10 h-10 rounded-xl flex items-center justify-center text-yellow-500">
                🚀
            </div>
        </header>

        <div class="flex-1 overflow-y-auto mt-6">
            <div class="bg-zinc-900/80 border border-zinc-800 p-6 rounded-[2rem] text-center">
                <p class="text-yellow-400 font-bold uppercase tracking-widest text-xs mb-2">Estado de la Misión</p>
                <h2 class="text-3xl font-black uppercase leading-none">OPERATIVA</h2>
                <div class="h-1 w-20 bg-yellow-400 mx-auto mt-4 rounded-full"></div>
            </div>
        </div>

        <footer class="flex items-end pb-6 h-[25%]">
            <div class="footer-controls">
                <div class="flex gap-2">
                    <div class="btn-original text-[10px]">COMANDO A</div>
                    <div class="btn-original text-[10px]">COMANDO B</div>
                </div>
                <button class="w-full bg-zinc-800 text-zinc-500 py-4 rounded-2xl font-black uppercase text-[9px] tracking-widest mt-2">
                    NEXO ARQUETIPO SISTEMAS
                </button>
            </div>
        </footer>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    tabActiva: 'INICIO'
                }
            },
            methods: {
                toggleAudio() { document.getElementById('adVideo').muted = !document.getElementById('adVideo').muted; }
            },
            mounted() {
                // El video aparece sutilmente a los 2 segundos
                setTimeout(() => { document.getElementById('nexo-video-carril').style.display = 'block'; }, 2000);
            }
        }).mount('#app')
    </script>
</body>
</html>
