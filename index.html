<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO NAVE: COMMAND TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: radial-gradient(circle at center, #150500 0%, #000 100%); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        
        /* HUD OVERLAY (Textura Carbón) */
        .hud-scan { position: fixed; inset: 0; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); opacity: 0.15; pointer-events: none; z-index: 100; }
        .hud-scan::before { content: " "; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 69, 0, 0.05) 3px); }

        /* HEADER HUD */
        .hud-top { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 20px 40px; border-bottom: 2px solid #333; background: rgba(10,10,10,0.9); z-index: 50; }
        .titulo { font-style: italic; font-weight: 900; font-size: 2.2rem; letter-spacing: -2px; }
        .titulo span { color: #ff0000; text-shadow: 0 0 15px #ff0000; }

        /* REACTOR CENTRAL (EL PEDIDO CLAVE) */
        .reactor-env { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; height: 340px; }
        
        .anillo-fuego {
            position: absolute; inset: 0; border: 6px solid transparent;
            border-top: 6px solid #ff4500; border-bottom: 6px solid #ff4500;
            border-radius: 50%; animation: girar 3s linear infinite;
            filter: drop-shadow(0 0 25px #ff4500) blur(0.8px);
        }

        .anillo-metal {
            position: absolute; inset: 30px; border: 18px solid #1a1a1a;
            border-radius: 50%; box-shadow: inset 0 0 40px #000, 0 0 20px #444;
            display: flex; align-items: center; justify-content: center;
            background: rgba(30,5,0,0.5);
        }

        /* POLLO AL CENTRO (Respetado de image_26.png) */
        .img-core { width: 150px; filter: drop-shadow(0 0 30px #ff4500); animation: pulse 2s infinite ease-in-out; }

        @keyframes girar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.08); opacity: 1; } }

        /* MÓDULOS HUD (Respetando image_26.png) */
        .node {
            position: absolute; width: 170px; background: rgba(0,0,0,0.95);
            border-left: 5px solid #ff0000; padding: 15px;
            clip-path: polygon(0 0, 90% 0, 100% 18%, 100% 100%, 0 100%);
            box-shadow: 0 0 25px rgba(255,0,0,0.3); transition: 0.3s; z-index: 20;
        }
        .node:hover { transform: scale(1.05); border-left: 5px solid #ffae00; box-shadow: 0 0 30px rgba(255,174,0,0.4); }
        
        /* Posiciones exactas alrededor del reactor */
        .n-1 { top: -20px; left: -110px; }   /* PARRILLADA */
        .n-2 { top: -20px; right: -110px; }  /* MILANESA */
        .n-3 { bottom: -20px; left: -110px; } /* EMPANADAS */
        .n-4 { bottom: -20px; right: -110px; } /* INFO ADICIONAL */

        .node-tag { font-size: 8px; color: #ffae00; letter-spacing: 3px; font-weight: 900; }
        .node-title { font-size: 10px; font-weight: 900; margin: 4px 0; color: #eee; text-transform: uppercase; font-style: italic; }
        .node-price { font-size: 16px; font-weight: 900; color: #ffcc00; font-style: italic; }

        /* MATRIZ DE COMBUSTIBLE (Bebidas Creativas) */
        .fuel-matrix { position: fixed; bottom: 85px; width: 100%; display: flex; justify-content: center; gap: 20px; padding: 0 40px; }
        .fuel-slot { width: 85px; height: 50px; border: 1px solid #333; position: relative; background: #050505; overflow: hidden; }
        .fuel-bar { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, #600 0%, #ff4500 100%); animation: charge 2s infinite ease-out; }
        .fuel-tag { position: absolute; top: -14px; width: 100%; text-align: center; font-size: 7px; color: #888; font-weight: bold; text-transform: uppercase; }
        .fuel-price { position: absolute; inset: 0; display: flex; items-center; justify-content: center; font-size: 11px; font-weight: 900; color: white; text-shadow: 0 0 5px #000; }

        @keyframes charge { 0% { height: 10%; } 50% { height: 90%; } 100% { height: 10%; } }

        /* BOTTOM NAV HUD */
        nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 25px; background: #0a0a0a; border-top: 2px solid #222; font-size: 11px; color: #666; font-weight: bold; }
        .active { color: #ff0000; text-shadow: 0 0 12px #ff0000; }
    </style>
</head>
<body>
    <div class="hud-scan"></div>

    <header class="hud-top">
        <h1 class="titulo italic uppercase">POMPÓN <span>NAVE</span></h1>
        <div class="text-right text-[9px] text-zinc-400">
            <p>FLAVOR SYSTEM v2.0</p>
            <p>RÍO GRANDE // TDF</p>
        </div>
    </header>

    <div class="reactor-env">
        <div class="anillo-fuego"></div>
        <div class="anillo-metal">
            <img src="https://i.ibb.co/6R0n7Y0/pollo-reactor.png" class="img-core" alt="CORE">
        </div>

        <div class="node n-1">
            <div class="node-tag">Sector: Parrilla</div>
            <div class="node-title">PARRILLADA COMPLETA</div>
            <div class="node-price">$12.500</div>
        </div>
        <div class="node n-2">
            <div class="node-tag">Sector: Sandwich</div>
            <div class="node-title">MILANESA NAVE</div>
            <div class="node-price">$5.800</div>
        </div>
        <div class="node n-3">
            <div class="node-tag">Sector: Masas</div>
            <div class="node-title">DOCENA EMPANADAS</div>
            <div class="node-price">$8.000</div>
        </div>
        <div class="node n-4">
            <div class="node-tag">Sector: Extras</div>
            <div class="node-title">DIPS & SALSAS</div>
            <div class="node-price">$600</div>
        </div>
    </div>

    <div class="fuel-matrix">
        <div class="fuel-slot">
            <div class="fuel-tag">QUILMES 1L</div>
            <div class="fuel-bar" style="animation-delay: 0s;"></div>
            <div class="fuel-price">$3.200</div>
        </div>
        <div class="fuel-slot">
            <div class="fuel-tag">GASEOSA</div>
            <div class="fuel-bar" style="animation-delay: 0.5s;"></div>
            <div class="fuel-price">$1.500</div>
        </div>
        <div class="fuel-slot">
            <div class="fuel-tag">VINOTECA CORE</div>
            <div class="fuel-bar" style="animation-delay: 1s;"></div>
            <div class="fuel-price">$4.500</div>
        </div>
    </div>

    <nav>
        <div class="active">IGNITION</div>
        <div>ORBIT</div>
        <div>PILOT CORE</div>
        <div>SUPPLY</div>
    </nav>
</body>
</html>
