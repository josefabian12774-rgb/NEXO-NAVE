<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POMPÓN NAVE - GEOMETRIC EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { 
            background: #000; background-image: radial-gradient(circle at center, #001a1a 0%, #000 100%);
            color: #fff; font-family: 'Orbitron', sans-serif;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column;
        }

        header { height: 7vh; display: flex; align-items: center; justify-content: center; }
        .titulo { font-size: 1.2rem; font-weight: 900; font-style: italic; letter-spacing: 2px; }
        .titulo span { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        /* ESCENA CENTRAL - GEOMETRÍA PURA */
        .main-scene { flex: 1; position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }

        /* REACTOR CENTRAL */
        .reactor-wrap { position: relative; width: 130px; height: 130px; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .ring-fire { position: absolute; inset: -5px; border: 2px solid transparent; border-top: 2px solid #ff0000; border-bottom: 2px solid #00f2ff; border-radius: 50%; animation: spin 4s linear infinite; }
        .inner-chassis { width: 110px; height: 110px; background: #000; border: 2px solid #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .img-core { width: 75px; filter: drop-shadow(0 0 10px #ff4500); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* BOTONES DE PLATOS - DISTRIBUCIÓN PROLIJA */
        .hud-card {
            position: absolute; width: 110px; background: rgba(5, 5, 5, 0.95); 
            border: 1px solid #333; border-left: 4px solid #ff0000;
            padding: 8px 4px; text-align: center; z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .name { font-size: 8px; font-weight: 900; color: #ffae00; margin-bottom: 2px; }
        .price { font-size: 12px; font-weight: 900; color: #fff; }

        /* COORDENADAS RECALIBRADAS SEGÚN TU BOCETO */
        .p-empanadas { top: 15%; left: 5%; }
        .p-asado { top: 0%; left: 50%; transform: translateX(-50%); }
        .p-pizzas { top: 15%; right: 5%; }
        .p-sandwich { bottom: 15%; left: 5%; }
        .p-ensaladas { bottom: 0%; left: 50%; transform: translateX(-50%); }
        .p-papas { bottom: 15%; right: 5%; }

        /* BOTONES LATERALES INTEGRADOS */
        .side-btn { position: absolute; width: 65px; height: 35px; background: #000; border: 1px solid #ff0000; color: #ff0000; font-size: 7px; display: flex; align-items: center; justify-content: center; font-weight: 900; z-index: 30; }
        .btn-salsas { left: 5%; top: 50%; transform: translateY(-50%); clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 15% 100%, 0% 50%); }
        .btn-postres { right: 5%; top: 50%; transform: translateY(-50%); clip-path: polygon(0% 0%, 85% 0%, 100% 50%, 85% 100%, 0% 100%); }

        /* HELADERAS CRYO */
        .crio-chamber { height: 18vh; width: 100%; display: flex; justify-content: center; gap: 6px; padding: 10px; background: rgba(0,10,15,0.98); border-top: 2px solid #00f2ff; }
        .crio-slot { flex: 1; border: 1px solid #00f2ff33; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 4px; }
        .crio-label { font-size: 6px; color: #00f2ff; font-weight: 900; }
        .crio-price { font-size: 11px; font-weight: 900; color: #fff; margin-top: 2px; }

        /* PUSH-UP */
        #push-up {
            position: fixed; bottom: -110%; left: 0; width: 100%; height: 60%;
            background: rgba(0,0,0,0.98); border-top: 4px solid #ff0000; z-index: 200; 
            transition: 0.4s ease-out; padding: 25px; display: flex; flex-direction: column; align-items: center;
        }
        #push-up.active { bottom: 0; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 2rem; color: #ff0000; }
        .confirm-btn { margin-top: auto; width: 100%; background: #990000; color: #fff; padding: 18px; font-weight: 900; border: 1px solid #ff0000; border-radius: 4px; text-transform: uppercase; font-size: 16px; }

        nav { height: 10vh; width: 100%; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; font-size: 9px; color: #444; }
        .active-tab { color: #ff0000; font-weight: 900; }
    </style>
</head>
<body>

    <header>
        <div class="titulo italic">POMPÓN <span>NAVE</span></div>
    </header>

    <main class="main-scene">
        <div class="reactor-wrap">
            <div class="ring-fire"></div>
            <div class="inner-chassis">
                <img src="https://i.ibb.co/6R0n7Y0/pollo-reactor.png" class="img-core">
            </div>

            <div class="hud-card p-empanadas" onclick="op('EMPANADAS', '$8.000')"><div class="name">EMPANADAS</div><div class="price">$8.000</div></div>
            <div class="hud-card p-asado" onclick="op('ASADO', '$12.500')"><div class="name">ASADO</div><div class="price">$12.500</div></div>
            <div class="hud-card p-pizzas" onclick="op('PIZZAS', '$4.200')"><div class="name">PIZZAS</div><div class="price">$4.200</div></div>
            
            <div class="side-btn btn-salsas" onclick="op('SALSAS', '$600')">SALSAS</div>
            <div class="side-btn btn-postres" onclick="op('POSTRES', '$1.500')">POSTRES</div>

            <div class="hud-card p-sandwich" onclick="op('SANDWICH', '$5.800')"><div class="name">SANDWICH</div><div class="price">$5.800</div></div>
            <div class="hud-card p-ensaladas" onclick="op('ENSALADAS', '$2.500')"><div class="name">ENSALADAS</div><div class="price">$2.500</div></div>
            <div class="hud-card p-papas" onclick="op('PAPAS FRITAS', '$2.000')"><div class="name">PAPAS</div><div class="price">$2.000</div></div>
        </div>
    </main>

    <div class="crio-chamber">
        <div class="crio-slot" onclick="op('QUILMES 1L', '$3.200')"><div class="crio-label uppercase">CRYO / QUILMES</div><div class="crio-price">$3.200</div></div>
        <div class="crio-slot" onclick="op('GASEOSA 1.5L', '$1.500')"><div class="crio-label uppercase">CRYO / SODA</div><div class="crio-price">$1.500</div></div>
        <div class="crio-slot" onclick="op('VINO SELEC.', '$4.500')"><div class="crio-label uppercase">CRYO / WINE</div><div class="crio-price">$4.500</div></div>
    </div>

    <div id="push-up">
        <div class="close-x" onclick="cl()">✕</div>
        <h2 id="ht" class="text-xl font-black text-orange-500 italic uppercase mt-4">PRODUCTO</h2>
        <div id="hp" class="text-6xl font-black mt-10 text-white">$0.00</div>
        <button class="confirm-btn" onclick="cl()">Confirmar Pedido</button>
    </div>

    <nav>
        <div class="active-tab">RADAR</div>
        <div>STOCKS</div>
        <div>SYSTEM</div>
    </nav>

    <script>
        function op(t, p) {
            document.getElementById('ht').innerText = t;
            document.getElementById('hp').innerText = p;
            document.getElementById('push-up').classList.add('active');
        }
        function cl() {
            document.getElementById('push-up').classList.remove('active');
        }
    </script>
</body>
</html>
