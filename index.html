<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POMPÓN NAVE - COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; background-image: radial-gradient(circle at center, #2b0d02 0%, #000 100%);
            color: #fff; font-family: 'Orbitron', sans-serif;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* ESCENA CENTRAL CENTRADA AL PIXEL */
        .main-scene { flex: 1; position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }

        /* REACTOR */
        .reactor-wrap { position: relative; width: 200px; height: 200px; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .ring-fire { position: absolute; inset: -10px; border: 3px solid transparent; border-top: 3px solid #ff4500; border-bottom: 3px solid #ff4500; border-radius: 50%; animation: spin 4s linear infinite; filter: drop-shadow(0 0 15px #ff4500); }
        .inner-chassis { width: 180px; height: 180px; background: #111; border: 4px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 30px #000; overflow: hidden; }
        .img-core { width: 120px; filter: drop-shadow(0 0 20px #ff4500); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* BOTONES DE PLATOS (HUD) */
        .hud-card {
            position: absolute; width: 100px; background: rgba(20, 20, 20, 0.95); 
            border-left: 4px solid #ff3c00; border-top: 1px solid #444; border-right: 1px solid #444; border-bottom: 1px solid #444;
            padding: 8px; text-align: center; cursor: pointer; z-index: 20;
            clip-path: polygon(0 0, 85% 0, 100% 20%, 100% 100%, 0 100%);
        }
        .hud-card:active { transform: scale(0.9) !important; background: #331100; }
        .name { font-size: 7px; font-weight: 900; color: #ffae00; margin-bottom: 2px; }
        .price { font-size: 11px; font-weight: 900; color: #fff; }

        /* POSICIONES RADIALES (REVISADAS) */
        .p-empanadas { top: -60px; left: -40px; }
        .p-asado { top: -90px; left: 50%; transform: translateX(-50%); }
        .p-pizzas { top: -60px; right: -40px; }
        .p-sandwich { bottom: -60px; left: -40px; }
        .p-ensaladas { bottom: -90px; left: 50%; transform: translateX(-50%); }
        .p-papas { bottom: -60px; right: -40px; }

        /* BOTONES LATERALES */
        .side-btn { position: absolute; width: 65px; height: 30px; background: #111; border: 1px solid #ff4500; color: #ff4500; font-size: 7px; display: flex; align-items: center; justify-content: center; font-weight: 900; z-index: 30; cursor: pointer; }
        .btn-salsas { left: -85px; top: 50%; transform: translateY(-50%); }
        .btn-postres { right: -85px; top: 50%; transform: translateY(-50%); }

        /* PUSH-UP PANEL */
        #push-up {
            position: fixed; bottom: -110%; left: 0; width: 100%; height: 60%;
            background: linear-gradient(180deg, #1a0800 0%, #000 100%);
            border-top: 4px solid #ff4500; z-index: 200; transition: 0.4s ease-out;
            padding: 30px; display: flex; flex-direction: column; align-items: center;
        }
        #push-up.active { bottom: 0; }

        /* FOOTER */
        .footer { width: 100%; background: #000; border-top: 1px solid #222; padding: 15px; display: flex; justify-content: space-around; font-size: 10px; }
    </style>
</head>
<body>

    <header class="p-4 text-center">
        <h1 class="text-xl font-black italic uppercase">POMPÓN <span class="text-red-600">NAVE</span></h1>
    </header>

    <main class="main-scene">
        <div class="reactor-wrap">
            <div class="ring-fire"></div>
            <div class="inner-chassis">
                <img src="https://i.ibb.co/6R0n7Y0/pollo-reactor.png" class="img-core">
            </div>

            <div class="hud-card p-empanadas" onclick="show('EMPANADAS', '$8.000')"><div class="name">EMPANADAS</div><div class="price">$8.000</div></div>
            <div class="hud-card p-asado" onclick="show('ASADO', '$12.500')"><div class="name">ASADO</div><div class="price">$12.500</div></div>
            <div class="hud-card p-pizzas" onclick="show('PIZZAS', '$4.200')"><div class="name">PIZZAS</div><div class="price">$4.200</div></div>

            <div class="side-btn btn-salsas" onclick="show('SALSAS', '$600')">SALSAS</div>
            <div class="side-btn btn-postres" onclick="show('POSTRES', '$1.500')">POSTRES</div>

            <div class="hud-card p-sandwich" onclick="show('SANDWICH', '$5.800')"><div class="name">SANDWICH</div><div class="price">$5.800</div></div>
            <div class="hud-card p-ensaladas" onclick="show('ENSALADAS', '$2.500')"><div class="name">ENSALADAS</div><div class="price">$2.500</div></div>
            <div class="hud-card p-papas" onclick="show('PAPAS FRITAS', '$2.000')"><div class="name">PAPAS FRITAS</div><div class="price">$2.000</div></div>
        </div>
    </main>

    <div id="push-up">
        <div class="w-10 h-1 bg-zinc-800 rounded mb-6" onclick="hide()"></div>
        <h2 id="t" class="text-2xl font-black text-orange-500 italic">PRODUCTO</h2>
        <div id="p" class="text-4xl font-black mt-4">$0.00</div>
        <button class="mt-auto w-full bg-orange-600 py-4 font-black uppercase rounded-lg" onclick="hide()">Confirmar Pedido</button>
    </div>

    <div class="footer">
        <div class="text-orange-600 font-bold">FUEL UP</div>
        <div class="text-zinc-600">ORBIT</div>
        <div class="text-zinc-600">PILOT</div>
    </div>

    <script>
        function show(title, price) {
            document.getElementById('t').innerText = title;
            document.getElementById('p').innerText = price;
            document.getElementById('push-up').classList.add('active');
        }
        function hide() {
            document.getElementById('push-up').classList.remove('active');
        }
    </script>
</body>
</html>
