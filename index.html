<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXO ARQUETIPO | Central de Mando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #ff6400; --glow: rgba(255, 100, 0, 0.3); }
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; }
        
        .nexo-border { border: 1px solid var(--main-color); box-shadow: 0 0 15px var(--glow); }
        .nexo-text { color: var(--main-color); text-shadow: 0 0 10px var(--main-color); }
        .nexo-bg { background: var(--glow); }

        @keyframes pulse-core {
            0%, 100% { box-shadow: 0 0 20px var(--main-color); transform: scale(1); }
            50% { box-shadow: 0 0 40px var(--main-color); transform: scale(1.02); }
        }
        .core-active { animation: pulse-core 2s infinite ease-in-out; border: 2px solid var(--main-color) !important; }

        .silicio-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            backdrop-filter: blur(15px); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .silicio-modal.active { transform: translateY(0); }

        input { background: rgba(255,255,255,0.05); border: 1px solid var(--main-color); padding: 12px; color: #fff; text-align: center; width: 100%; outline: none; }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="flex justify-center items-center">
    <div id="app" v-cloak class="w-full max-w-lg h-screen flex flex-col items-center p-4 relative">
        
        <header class="w-full flex justify-between items-start z-50">
            <button @click="abrirSala" class="nexo-border nexo-bg px-3 py-2 rounded-br-xl text-[10px] font-black uppercase tracking-tighter">
                SALA DE CONTROL
            </button>

            <div class="text-center">
                <h1 @click="masterKey" class="text-xl font-black italic nexo-text tracking-widest cursor-pointer">{{ config.nombre }}</h1>
                <p class="text-[6px] text-zinc-500 uppercase tracking-[0.5em]">{{ statusMsg }}</p>
            </div>

            <div class="nexo-border bg-black/80 p-1 rounded min-w-[60px] text-center">
                <span class="text-[5px] block text-cyan-400 font-bold uppercase">Ciclo Activo</span>
                <span class="text-[10px] font-mono">{{ sessionTipo }}</span>
            </div>
        </header>

        <div class="relative w-[320px] h-[320px] flex items-center justify-center my-auto">
            <div class="w-44 h-44 rounded-full border-2 border-zinc-900 bg-black flex items-center justify-center z-[100] cursor-pointer overflow-hidden"
                 :class="{'core-active': sistemaIniciado}" @click="handleReactor">
                <img v-if="sistemaIniciado" :src="getURL('pollo-reactor.webp')" class="w-[130%] opacity-80">
                <div v-else class="text-center">
                    <span class="nexo-text font-black italic animate-pulse block">STANDBY</span>
                    <span class="text-[6px] text-zinc-600 uppercase">Click para Activar</span>
                </div>
            </div>

            <div v-for="(p, i) in platos" :key="p.id" :style="getPos(i, platos.length, 130)" @click="abrirOpciones(p)"
                 class="absolute w-14 h-14 rounded-xl bg-black border border-white/10 overflow-hidden z-50 cursor-pointer shadow-2xl">
                <img :src="getURL(p.img)" class="w-full h-full object-cover" :class="{'grayscale opacity-20': !sistemaIniciado}">
                <p class="absolute bottom-0 w-full text-[5px] font-black uppercase bg-black/90 py-1 text-center" :style="{color: config.color}">{{p.label}}</p>
            </div>
        </div>

        <div class="silicio-modal" :class="{'active': panelControl}">
            <div v-if="paso === 0" class="w-full max-w-xs space-y-4 p-6">
                <h2 class="nexo-text text-center font-black mb-8 uppercase italic">Protocolos Nexo</h2>
                <button @click="paso = 'fantasma'" class="w-full p-4 border border-zinc-700 bg-zinc-900/40 text-left">
                    <p class="text-orange-500 font-black text-xs uppercase">1. Modo Fantasma</p>
                    <p class="text-[7px] text-zinc-500 uppercase">24 Horas de personalización</p>
                </button>
                <button @click="paso = 'contrato'" class="w-full p-4 nexo-border nexo-bg text-left">
                    <p class="nexo-text font-black text-xs uppercase">2. Ciclo de Prueba (20 Días)</p>
                    <p class="text-[7px] text-zinc-400 uppercase">Vinculación ADN Obligatoria</p>
                </button>
                <button @click="panelControl = false" class="w-full text-[8px] text-zinc-600 font-black uppercase pt-4">Cerrar</button>
            </div>

            <div v-if="paso === 'fantasma'" class="w-full max-w-xs space-y-6 text-center p-6">
                <h2 class="nexo-text font-black uppercase">Personalización Fantasma</h2>
                <input v-model="temp.nombre" placeholder="NOMBRE NAVE">
                <input type="color" v-model="temp.color" class="h-12 cursor-pointer p-0">
                <button @click="aplicarFantasma" class="w-full py-4 font-black text-xs nexo-border" :style="{background: temp.color, color:'#000'}">INICIAR CICLO</button>
            </div>

            <div v-if="paso === 'adn'" class="w-full max-w-xs space-y-4 p-6">
                <h2 class="nexo-text text-center font-black mb-6 uppercase">Registrar ADN</h2>
                <input v-model="formADN.wa" placeholder="WHATSAPP">
                <input v-model="formADN.dni" placeholder="DNI / CUIT">
                <button @click="consolidarADN" class="w-full py-4 nexo-bg nexo-text font-black text-xs nexo-border">SINCRONIZAR ADN</button>
            </div>

            <div v-if="paso === 'contrato'" class="w-full max-w-sm p-8">
                <h2 class="nexo-text text-center font-black mb-6 uppercase">Contrato de Acero</h2>
                <div class="text-[8px] text-zinc-400 space-y-3 mb-8 uppercase leading-loose">
                    <p v-for="p in pilares">🔹 {{p}}</p>
                </div>
                <button @click="paso = 'adn'" class="w-full py-4 nexo-border nexo-text font-black text-xs">ACEPTAR</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    base: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public',
                    panelControl: false, paso: 0, sistemaIniciado: false,
                    config: { nombre: 'NEXO NAVE', color: '#ff6400' },
                    temp: { nombre: '', color: '#ff6400' },
                    formADN: { wa: '', dni: '' },
                    sessionTipo: 'NULL', statusMsg: 'PROTOCOLO EXTERNO',
                    pilares: ["Propiedad Nexo", "Ciclo 30 días", "Identidad vinculada ADN", "Jurisdicción TDF"],
                    platos: [
                        { id: 1, img: 'asado-escolta.webp', label: 'Asado' },
                        { id: 2, img: 'milanga-soberana.webp', label: 'Milanesa' },
                        { id: 3, img: 'empanada-escuadron.webp', label: 'Empanadas' },
                        { id: 4, img: 'pizza-core.webp', label: 'Pizza' },
                        { id: 5, img: 'flan-casero-nexo.webp', label: 'Postre' },
                        { id: 6, img: 'papas-mega-reactor.webp', label: 'Papas' }
                    ]
                }
            },
            mounted() {
                this.validarCiclos();
                this.cargarConfig();
            },
            methods: {
                getURL(n) { return `${this.base}/${n}`; },
                getPos(i, total, radius) {
                    const angle = (i * (360 / total) - 90) * (Math.PI / 180);
                    return `transform: translate(${Math.cos(angle)*radius}px, ${Math.sin(angle)*radius}px)`;
                },
                abrirSala() { this.paso = 0; this.panelControl = true; },
                validarCiclos() {
                    const h = localStorage.getItem('nexo_h_fantasma');
                    const adn = localStorage.getItem('nexo_adn');
                    if (adn) { 
                        this.sessionTipo = 'ADN'; this.statusMsg = 'IDENTIDAD CONSOLIDADA';
                    } else if (h) {
                        this.sessionTipo = 'GHOST'; this.statusMsg = 'CICLO FANTASMA ACTIVO';
                        if (((new Date() - new Date(h)) / 36e5) >= 24) { localStorage.clear(); location.reload(); }
                    }
                },
                cargarConfig() {
                    const saved = localStorage.getItem('nexo_config');
                    if(saved) { this.config = JSON.parse(saved); this.updateStyles(); }
                },
                updateStyles() {
                    document.documentElement.style.setProperty('--main-color', this.config.color);
                    document.documentElement.style.setProperty('--glow', this.config.color + '44');
                },
                aplicarFantasma() {
                    this.config.nombre = this.temp.nombre.toUpperCase() || 'NAVE';
                    this.config.color = this.temp.color;
                    localStorage.setItem('nexo_h_fantasma', new Date().toISOString());
                    localStorage.setItem('nexo_config', JSON.stringify(this.config));
                    this.updateStyles(); this.panelControl = false; location.reload();
                },
                consolidarADN() {
                    localStorage.setItem('nexo_adn', JSON.stringify(this.formADN));
                    localStorage.setItem('nexo_inicio_adn', new Date().toISOString());
                    location.reload();
                },
                handleReactor() { 
                    if(this.sessionTipo === 'NULL') { 
                        this.abrirSala(); 
                    } else { this.sistemaIniciado = !this.sistemaIniciado; }
                },
                masterKey() {
                    if(prompt("MASTER KEY") === "051112182129jsm13818") {
                        localStorage.setItem('nexo_adn', 'MASTER');
                        localStorage.setItem('nexo_config', JSON.stringify({nombre:'CENTRAL COMMAND', color:'#00f2ff'}));
                        location.reload();
                    }
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
