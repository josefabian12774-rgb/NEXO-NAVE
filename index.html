<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLI-O TERMINAL: POMPÓN NAVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { background: #050505; color: #0f0; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
        
        /* SCANLINES EFECTO NAVE VIEJA */
        body::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; }

        /* EL REACTOR DE COMBUSTIÓN (EL POLLO) */
        .reactor-core { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 280px; border: 2px solid #0f0; border-radius: 50%; box-shadow: 0 0 20px #0f0; animation: pulse 2s infinite; }
        .radar-line { position: absolute; top: 50%; left: 50%; width: 50%; height: 2px; background: #0f0; transform-origin: left center; animation: radar 4s linear infinite; }
        
        @keyframes radar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { box-shadow: 0 0 10px #0f0; } 50% { box-shadow: 0 0 30px #0f0; } 100% { box-shadow: 0 0 10px #0f0; } }

        /* MÓDULOS DE PLATOS (ESTRUCTURA HÍBRIDA) */
        .module { position: absolute; border: 1px solid #0f0; padding: 10px; background: rgba(0, 20, 0, 0.8); width: 160px; text-transform: uppercase; }
        .module::before { content: "SYS_ACTIVE"; font-size: 8px; position: absolute; top: -12px; left: 0; }
        
        .m-1 { top: 5%; left: 5%; border-left: 10px solid #0f0; } /* PARRILLADA */
        .m-2 { top: 5%; right: 5%; border-right: 10px solid #0f0; } /* MILANESA */
        .m-3 { bottom: 15%; left: 5%; border-left: 10px solid #0f0; } /* EMPANADAS */

        /* BEBIDAS: MATRIZ DE COMBUSTIBLE */
        .fuel-matrix { position: fixed; bottom: 0; width: 100%; height: 60px; border-top: 1px solid #0f0; display: flex; align-items: center; justify-content: space-around; background: #000; font-size: 10px; }
        .fuel-cell { border: 1px solid #0f0; padding: 5px 10px; cursor: pointer; }
        .fuel-cell:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>

    <div class="p-4 flex justify-between items-start">
        <div>
            <h1 class="text-xl font-bold">[ POMPÓN NAVE v2.0 ]</h1>
            <p class="text-[10px]">LOC: RIO GRANDE_TDF // STATUS: ONLINE</p>
        </div>
        <div class="text-right text-[10px]">
            <p>COEFICIENTE: 0.98</p>
            <p>ARCH: NEXO_ARQUETIPO</p>
        </div>
    </div>

    <div class="reactor-core">
        <div class="radar-line"></div>
        <div class="absolute inset-0 flex items-center justify-center">
            <img src="https://i.ibb.co/6R0n7Y0/pollo-reactor.png" class="w-32 opacity-80" alt="POLLO">
        </div>
    </div>

    <div class="module m-1">
        <p class="text-[8px] text-green-300">CAT: PARRILLA</p>
        <h2 class="font-bold text-sm">PARRILLADA COMPLETA</h2>
        <p class="text-lg font-black mt-1">$12.500</p>
    </div>

    <div class="module m-2">
        <p class="text-[8px] text-green-300">CAT: SANDWICH</p>
        <h2 class="font-bold text-sm">MILANESA NAVE</h2>
        <p class="text-lg font-black mt-1">$5.800</p>
    </div>

    <div class="module m-3">
        <p class="text-[8px] text-green-300">CAT: MASAS</p>
        <h2 class="font-bold text-sm">EMPANADA DOC.</h2>
        <p class="text-lg font-black mt-1">$8.000</p>
    </div>

    <div class="fuel-matrix">
        <div class="fuel-cell">FUEL_A: QUILMES [$3200]</div>
        <div class="fuel-cell">FUEL_B: GASEOSA [$1500]</div>
        <div class="fuel-cell">FUEL_C: WINE_CORE [$4500]</div>
    </div>

</body>
</html>
