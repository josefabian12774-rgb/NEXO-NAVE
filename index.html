<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXO ARQUETIPO | Central de Mando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #ff6400; --glow: rgba(255, 100, 0, 0.3); }
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; }
        
        .nexo-border { border: 1px solid var(--main-color); box-shadow: 0 0 15px var(--glow); }
        .nexo-text { color: var(--main-color); text-shadow: 0 0 10px var(--main-color); }
        .nexo-bg { background: var(--glow); }

        @keyframes pulse-core {
            0%, 100% { box-shadow: 0 0 20px var(--main-color); transform: scale(1); }
            50% { box-shadow: 0 0 40px var(--main-color); transform: scale(1.02); }
        }
        .core-active { animation: pulse-core 2s infinite ease-in-out; border: 2px solid var(--main-color) !important; }

        .silicio-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            backdrop-filter: blur(15px); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .silicio-modal.active { transform: translateY(0); }

        .file-input { display: none; }
        .upload-label { border: 1px dashed var(--main-color); padding: 10px; cursor: pointer; display: block; font-size: 8px; text-align: center; }
        
        [v-cloak] { display: none; }
    </style>
</head>
<body class="flex justify-center items-center">
    <div id="app" v-cloak class="w-full max-w-lg h-screen flex flex-col items-center p-4 relative">
        
        <header class="w-full flex justify-between items-center z-50 h-16">
            <button @click="abrirSala" class="nexo-border nexo-bg px-3 py-2 rounded-br-xl text-[8px] font-black uppercase">SALA DE CONTROL</button>

            <div class="flex-1 flex justify-center px-4" @click="masterKey">
                <img v-if="config.logo" :src="config.logo" class="h-12 w-auto object-contain filter drop-shadow-[0_0_8px_var(--main-color)]">
                <h1 v-else class="text-xl font-black italic nexo-text tracking-widest">{{ config.nombre }}</h1>
            </div>

            <div class="nexo-border bg-black/80 p-1 rounded text-center min-w-[50px]">
                <span class="text-[5px] block text-cyan-400 font-bold uppercase">Ciclo</span>
                <span class="text-[10px] font-mono">{{ sessionTipo }}</span>
            </div>
        </header>

        <div class="relative w-[300px] h-[300px] flex items-center justify-center my-auto">
            <div class="w-40 h-40 rounded-full border-2 border-zinc-900 bg-black flex items-center justify-center z-[100] cursor-pointer overflow-hidden"
                 :class="{'core-active': sistemaIniciado}" @click="handleReactor">
                <img v-if="sistemaIniciado" :src="getURL('pollo-reactor.webp')" class="w-[130%] opacity-80">
                <span v-else class="nexo-text font-black italic animate-pulse">ACTIVA</span>
            </div>

            <div v-for="(p, i) in platos" :key="p.id" :style="getPos(i, platos.length, 120)"
                 class="absolute w-14 h-14 rounded-xl bg-black border border-white/10 overflow-hidden z-50 shadow-2xl">
                <img :src="p.customImg || getURL(p.img)" class="w-full h-full object-cover" :class="{'grayscale opacity-20': !sistemaIniciado}">
                <p class="absolute bottom-0 w-full text-[5px] font-black uppercase bg-black/90 py-1 text-center" :style="{color: config.color}">{{p.label}}</p>
            </div>
        </div>

        <div class="silicio-modal" :class="{'active': panelControl}">
            <div v-if="paso === 0" class="w-full max-w-xs space-y-4 p-6 overflow-y-auto max-h-full">
                <h2 class="nexo-text text-center font-black mb-4 uppercase italic">Configuración de Nave</h2>
                
                <div class="space-y-2">
                    <p class="text-[7px] text-zinc-500 uppercase">Cargar Identidad (Logo)</p>
                    <label class="upload-label nexo-text">
                        {{ config.logo ? 'CAMBIAR LOGO' : 'SUBIR LOGO PNG/JPG' }}
                        <input type="file" class="file-input" @change="subirLogo" accept="image/*">
                    </label>
                </div>

                <div class="space-y-2">
                    <p class="text-[7px] text-zinc-500 uppercase">Frecuencia de Energía</p>
                    <input type="color" v-model="config.color" @input="updateStyles" class="h-10 p-0 cursor-pointer">
                </div>

                <div class="space-y-2 pt-4">
                    <p class="text-[7px] text-zinc-500 uppercase font-black">Fotos del Menú</p>
                    <div class="grid grid-cols-3 gap-2">
                        <div v-for="p in platos" :key="p.id" class="relative group">
                            <label class="block h-10 w-full border border-zinc-800 rounded overflow-hidden cursor-pointer">
                                <img :src="p.customImg || getURL(p.img)" class="object-cover w-full h-full">
                                <input type="file" class="file-input" @change="subirFotoPlato($event, p)" accept="image/*">
                            </label>
                        </div>
                    </div>
                </div>

                <hr class="border-zinc-800">
                
                <button @click="guardarTodo" class="w-full py-4 nexo-border nexo-bg nexo-text font-black text-xs uppercase">Consolidar Cambios</button>
                <button @click="panelControl = false" class="w-full text-[8px] text-zinc-600 font-black uppercase">Cerrar</button>
            </div>
        </div>

    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    base: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public',
                    panelControl: false, paso: 0, sistemaIniciado: false,
                    config: { nombre: 'NEXO NAVE', color: '#ff6400', logo: null },
                    sessionTipo: 'NULL',
                    platos: [
                        { id: 1, img: 'asado-escolta.webp', label: 'Asado', customImg: null },
                        { id: 2, img: 'milanga-soberana.webp', label: 'Milanesa', customImg: null },
                        { id: 3, img: 'empanada-escuadron.webp', label: 'Empanadas', customImg: null },
                        { id: 4, img: 'pizza-core.webp', label: 'Pizza', customImg: null },
                        { id: 5, img: 'flan-casero-nexo.webp', label: 'Postre', customImg: null },
                        { id: 6, img: 'papas-mega-reactor.webp', label: 'Papas', customImg: null }
                    ]
                }
            },
            mounted() {
                this.cargarConfig();
                this.sessionTipo = localStorage.getItem('nexo_adn') ? 'ADN' : (localStorage.getItem('nexo_h_fantasma') ? 'GHOST' : 'NULL');
            },
            methods: {
                getURL(n) { return `${this.base}/${n}`; },
                getPos(i, total, radius) {
                    const angle = (i * (360 / total) - 90) * (Math.PI / 180);
                    return `transform: translate(${Math.cos(angle)*radius}px, ${Math.sin(angle)*radius}px)`;
                },
                abrirSala() { this.panelControl = true; },
                subirLogo(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (f) => { this.config.logo = f.target.result; };
                        reader.readAsDataURL(file);
                    }
                },
                subirFotoPlato(e, plato) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (f) => { plato.customImg = f.target.result; };
                        reader.readAsDataURL(file);
                    }
                },
                updateStyles() {
                    document.documentElement.style.setProperty('--main-color', this.config.color);
                    document.documentElement.style.setProperty('--glow', this.config.color + '44');
                },
                guardarTodo() {
                    localStorage.setItem('nexo_config', JSON.stringify(this.config));
                    localStorage.setItem('nexo_platos', JSON.stringify(this.platos));
                    localStorage.setItem('nexo_h_fantasma', new Date().toISOString());
                    this.panelControl = false;
                    alert("SISTEMA ACTUALIZADO");
                },
                cargarConfig() {
                    const conf = localStorage.getItem('nexo_config');
                    if(conf) this.config = JSON.parse(conf);
                    const plats = localStorage.getItem('nexo_platos');
                    if(plats) this.platos = JSON.parse(plats);
                    this.updateStyles();
                },
                handleReactor() {
                    if(this.sessionTipo === 'NULL') this.abrirSala();
                    else this.sistemaIniciado = !this.sistemaIniciado;
                },
                masterKey() {
                    if(prompt("MASTER KEY") === "051112182129jsm13818") {
                        localStorage.setItem('nexo_adn', 'MASTER');
                        location.reload();
                    }
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
