<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXO NAVE | ORIGINAL RESTORED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        /* TU DISEÑO ORIGINAL */
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; min-height: 100vh; overflow: hidden; }
        .reactor-core { border: 2px solid #333; transition: all 0.5s ease; }
        .active-core { border: 3px solid #ff6400; box-shadow: 0 0 30px #ff6400; }
        .glass-panel { background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2); backdrop-filter: blur(10px); }
        
        /* Capa de Lluvia (Invisible hasta activarse) */
        #data-rain { position: fixed; inset: 0; pointer-events: none; z-index: 20000; display: none; }
        .rain-char { position: absolute; color: #00f2ff; font-family: monospace; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh); opacity: 0; } }

        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <div id="data-rain"></div>

        <div v-if="mostrandoModal" class="fixed inset-0 z-[10000] bg-black/95 flex items-center justify-center p-4">
            <div class="glass-panel w-full max-w-sm p-8 rounded-[30px] border-cyan-500/50 text-center">
                <template v-if="!aceptoContrato">
                    <h2 class="text-orange-500 font-black mb-4 uppercase">Contrato Nexo</h2>
                    <div class="text-[7px] text-left text-zinc-400 space-y-2 mb-6 uppercase">
                        <p v-for="p in pilares">🔹 {{p}}</p>
                    </div>
                    <button @click="aceptoContrato = true" class="w-full py-3 border border-cyan-500 text-cyan-500 text-[10px]">ACEPTAR PILARES</button>
                </template>
                <template v-else>
                    <h2 class="text-cyan-400 font-black mb-4 uppercase">Registro de ADN</h2>
                    <input v-model="form.wa" type="tel" placeholder="WHATSAPP" class="bg-black border border-zinc-800 p-3 w-full mb-2 text-center text-xs">
                    <input v-model="form.dni" type="text" placeholder="DNI / CUIT" class="bg-black border border-zinc-800 p-3 w-full mb-4 text-center text-xs">
                    <button @click="confirmarRegistro" class="w-full py-3 bg-cyan-500/20 border border-cyan-500 text-cyan-500 text-[10px]">SINCRONIZAR</button>
                </template>
                <button @click="masterKey" class="mt-6 text-[5px] text-zinc-800 uppercase">Admin Access</button>
            </div>
        </div>

        <div class="w-full max-w-md h-screen mx-auto flex flex-col p-4 relative">
            
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-lg font-black text-orange-500 italic tracking-tighter">NEXO NAVE</h1>
                    <p class="text-[6px] text-cyan-500 uppercase tracking-[0.4em]">Protocolo PAV-UX</p>
                </div>
                <button v-if="!esCliente" @click="mostrandoModal = true" class="text-[6px] border border-orange-500/50 px-2 py-1 text-orange-500 animate-pulse">
                    ACTIVAR PRUEBA 20 DÍAS
                </button>
            </header>

            <div class="relative flex-1 flex items-center justify-center">
                <div class="w-40 h-40 rounded-full reactor-core flex items-center justify-center bg-black z-50 cursor-pointer"
                     :class="{'active-core': iniciado}" @click="iniciado = !iniciado">
                    <img v-if="iniciado" src="https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public/pollo-reactor.webp" class="w-[110%] mix-blend-plus-lighter">
                    <span v-else class="text-orange-600 text-[8px] font-black uppercase">Ignición</span>
                </div>

                <div v-for="(p, i) in platos" :key="i" :style="getPos(i, platos.length, 120)"
                     class="absolute w-14 h-14 rounded-xl border border-zinc-800 bg-black overflow-hidden shadow-2xl">
                    <img :src="p.img" class="w-full h-full object-cover">
                    <div class="absolute bottom-0 w-full bg-black/80 text-[5px] text-orange-500 text-center py-1 uppercase">{{p.label}}</div>
                </div>
            </div>

            <footer class="h-24 grid grid-cols-4 gap-2 mb-4">
                <div class="col-span-2 bg-black border border-zinc-900 rounded-xl overflow-hidden relative">
                    <video loop muted playsinline autoplay class="w-full h-full object-cover opacity-50">
                        <source src="grok_video_2026-03-15-16-48-07.mp4" type="video/mp4">
                    </video>
                </div>
                <div v-for="n in 2" class="bg-zinc-900/30 border border-zinc-900 rounded-xl flex items-center justify-center">
                    <span class="text-[6px] text-zinc-600 uppercase">Sensor</span>
                </div>
            </footer>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    iniciado: false,
                    esCliente: localStorage.getItem('nexo_active') === 'true',
                    mostrandoModal: false,
                    aceptoContrato: false,
                    form: { wa: '', dni: '' },
                    pilares: ["Propiedad Nexo", "Ciclo 30 días", "Identidad WA/DNI", "Responsabilidad Cliente", "Protocolo Anchored", "Jurisdicción TDF"],
                    platos: [
                        { label: 'Asado', img: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public/asado-escolta.webp' },
                        { label: 'Pizza', img: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public/pizza-core.webp' },
                        { label: 'Empanada', img: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public/empanada-escuadron.webp' },
                        { label: 'Milanesa', img: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public/milanga-soberana.webp' }
                    ]
                }
            },
            mounted() {
                // Chequeo de 24 horas solares para purga en modo fantasma
                const h = localStorage.getItem('nexo_h');
                if(!h) localStorage.setItem('nexo_h', new Date().toISOString());
                else if(!this.esCliente && (new Date() - new Date(h))/36e5 >= 24) localStorage.clear();
            },
            methods: {
                getPos(i, total, r) {
                    const a = (i * (360/total) - 90) * (Math.PI/180);
                    return `transform: translate(${Math.cos(a)*r}px, ${Math.sin(a)*r}px)`;
                },
                confirmarRegistro() {
                    if(this.form.wa && this.form.dni) {
                        this.rain('#00f2ff');
                        localStorage.setItem('nexo_active', 'true');
                        setTimeout(() => location.reload(), 3000);
                    }
                },
                masterKey() {
                    if(prompt("PASS") === "051112182129jsm13818") {
                        this.rain('#ffcc00');
                        localStorage.setItem('nexo_active', 'true');
                        setTimeout(() => location.reload(), 3000);
                    }
                },
                rain(color) {
                    const d = document.getElementById('data-rain');
                    d.style.display = 'block';
                    for(let i=0; i<50; i++) {
                        let c = document.createElement('div');
                        c.className = 'rain-char';
                        c.innerText = Math.random() > 0.5 ? '1' : '0';
                        c.style.left = Math.random()*100+'vw';
                        c.style.color = color;
                        c.style.animationDuration = (Math.random()*2+1)+'s';
                        d.appendChild(c);
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
