<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXO NAVE ENGINE v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        
        /* REACTOR CENTRAL */
        .main-scene { height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; transform: scale(0.85); }
        .reactor { width: 220px; height: 220px; border-radius: 50%; border: 4px solid #ff4500; box-shadow: 0 0 30px #ff4500; display: flex; align-items: center; justify-content: center; background: #111; z-index: 10; }
        .img-core { width: 80%; filter: drop-shadow(0 0 15px #ff4500); }

        /* PLATOS COMO BOTONES (Interactivos) */
        .plato-btn {
            position: absolute; width: 100px; background: rgba(20,20,20,0.9);
            border: 1px solid #444; border-left: 4px solid #ff4500; padding: 5px;
            cursor: pointer; transition: 0.2s; z-index: 20;
        }
        .plato-btn:active { transform: scale(0.9); border-left-color: #00ff00; }
        .img-thumb { width: 100%; height: 50px; background: #222; margin-bottom: 3px; }
        .txt-label { font-size: 7px; text-align: center; }

        /* POSICIONES */
        .p1 { top: -70px; left: -50px; } .p2 { top: -100px; left: 50%; transform: translateX(-50%); } .p3 { top: -70px; right: -50px; }
        .p4 { bottom: -70px; left: -50px; } .p5 { bottom: -100px; left: 50%; transform: translateX(-50%); } .p6 { bottom: -70px; right: -50px; }

        /* PUSH-UP MODAL (La ficha técnica) */
        #push-up {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%;
            background: rgba(10,10,10,0.98); border-top: 3px solid #ff4500;
            z-index: 200; transition: 0.5s cubic-bezier(0.17, 0.84, 0.44, 1);
            padding: 30px; display: flex; flex-direction: column; align-items: center;
        }
        #push-up.active { bottom: 0; }
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 20px; color: #ff4500; }
    </style>
</head>
<body>

    <main class="main-scene">
        <div class="reactor">
            <img src="https://i.ibb.co/6R0n7Y0/pollo-reactor.png" class="img-core">
            
            <div class="plato-btn p1" onclick="openDetails('EMPANADAS', '$8.000', 'Mix de carne y jamón/queso')">
                <div class="img-thumb"></div><div class="txt-label">EMPANADAS</div>
            </div>
            <div class="plato-btn p2" onclick="openDetails('ASADO', '$12.500', 'Tira de asado premium')">
                <div class="img-thumb"></div><div class="txt-label">ASADO</div>
            </div>
            <div class="plato-btn p3" onclick="openDetails('PIZZA', '$4.200', 'Muzzarella especial')">
                <div class="img-thumb"></div><div class="txt-label">PIZZA</div>
            </div>
            </div>
    </main>

    <div id="push-up">
        <div class="close-btn" onclick="closeDetails()">✕</div>
        <h2 id="m-title" class="text-2xl font-black text-orange-500">TITULO</h2>
        <p id="m-desc" class="text-gray-400 mt-2 text-center">Descripción del producto...</p>
        <div id="m-price" class="text-4xl font-black mt-6">$0.00</div>
        <button class="mt-8 bg-orange-600 px-10 py-3 font-bold rounded-full">AGREGAR A LA NAVE</button>
    </div>

    <script>
        function openDetails(title, price, desc) {
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-price').innerText = price;
            document.getElementById('m-desc').innerText = desc;
            document.getElementById('push-up').classList.add('active');
        }
        function closeDetails() {
            document.getElementById('push-up').classList.remove('active');
        }
    </script>
</body>
</html>
