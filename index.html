<!-- Conector Nexo Arquetipo - Nave Comidas -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  const supabaseUrl = 'https://manaejtcurxbcsozqcsh.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // (Tu clave anon)
  const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

  async function cargarNave() {
    const { data: platos, error } = await _supabase.from('platos').select('*');
    
    if (error) {
      console.log("Error en los motores:", error);
      return;
    }

    const contenedor = document.getElementById('grid-platos');
    contenedor.innerHTML = ''; // Limpiamos la basura anterior

    platos.forEach(plato => {
      contenedor.innerHTML += `
        <div class="tarjeta-nave">
          <img src="${plato.imagen_url}" alt="${plato.nombre}">
          <h3>${plato.nombre}</h3>
          <p class="precio">$${plato.precio}</p>
        </div>
      `;
    });
  }
  cargarNave();
</script>
