<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POMPÓN NAVE - REACTOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .titulo-nave { font-style: italic; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
        
        /* EL REACTOR QUE GIRA (HECHO CON PURO CÓDIGO) */
        .reactor-wrap {
            position: relative; width: 160px; height: 160px; margin: 20px auto;
            display: flex; align-items: center; justify-content: center;
        }
        .anillo-giratorio {
            position: absolute; width: 100%; height: 100%;
            border: 4px dashed #ff4500; border-radius: 50%;
            animation: girar 8s linear infinite;
            box-shadow: 0 0 15px #ff4500;
        }
        .centro-reactor {
            width: 70%; height: 70%; background: radial-gradient(circle, #333, #000);
            border-radius: 50%; border: 2px solid #555;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        @keyframes girar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* TARJETAS ESTILO NAVE */
        .tarjeta {
            background: #111; border-left: 5px solid #ff4500;
            padding: 15px; border-radius: 4px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body class="p-4">
    <header class="text-center border-b border-zinc-800 pb-4">
        <h1 class="text-3xl titulo-nave">POMPÓN <span class="text-orange-600">NAVE</span></h1>
    </header>

    <div class="reactor-wrap">
        <div class="anillo-giratorio"></div>
        <div class="centro-reactor">
            <div class="text-[10px] font-bold text-orange-500 tracking-tighter">FLAVOR</div>
            <div class="text-lg font-black italic">NAVE</div>
        </div>
    </div>

    <div id="menu-real" class="max-w-md mx-auto">
        </div>

    <script type="module" src="app.js"></script>
</body>
</html>
