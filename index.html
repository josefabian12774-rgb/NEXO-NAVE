<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Arquetipo | Flavor Reactor 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; min-height: 100vh; overflow: hidden; margin: 0; }
        
        /* Efecto de Palpitación del Reactor */
        @keyframes pulse-heat {
            0% { box-shadow: 0 0 20px #ff6400; transform: scale(1); }
            50% { box-shadow: 0 0 60px #ff3300; transform: scale(1.05); }
            100% { box-shadow: 0 0 20px #ff6400; transform: scale(1); }
        }
        .reactor-core { border: 3px solid #ff6400; animation: pulse-heat 2s infinite ease-in-out; background: #000; }

        /* Botones de Órbita */
        .orbit-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.1); background: #0a0a0a; overflow: hidden; cursor: pointer; }
        .orbit-btn:hover { border-color: #ff6400; transform: scale(1.2); z-index: 60; box-shadow: 0 0 20px #ff6400; }
        
        /* Pantalla de Bienvenida (El "Puente") */
        .welcome-overlay {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-col; justify-content: center; align-items: center;
            border: 4px double #ff6400; margin: 10px;
        }

        .glow-text { text-shadow: 0 0 15px #ff6400; }
        [v-cloak] { display: none; }

        /* Animación de escaneo */
        .scanner { width: 100%; height: 2px; background: rgba(255, 100, 0, 0.3); position: absolute; animation: scan 3s infinite linear; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        
        <audio id="snd-ambient" loop src="https://www.soundjay.com/transportation/subway-train-hum-1.mp3"></audio>
        <audio id="snd-click" src="https://www.soundjay.com/buttons/button-09.mp3"></audio>

        <div v-if="!sistemaIniciado" class="welcome-overlay text-center p-6">
            <div class="scanner"></div>
            <h1 class="text-2xl font-black text-orange-500 glow-text mb-4">NEXO ARQUETIPO</h1>
            <p class="text-zinc-400 text-[10px] tracking-[0.4em] mb-10 uppercase">Iniciando protocolo de sabor...</p>
            <button @click="iniciarNave" class="px-8 py-4 border-2 border-orange-600 text-orange-500 font-bold tracking-widest hover:bg-orange-600 hover:text-black transition-all uppercase italic">
                Aceder a la Nave
            </button>
        </div>

        <div class="w-full max-w-lg h-screen flex flex-col items-center py-6 px-4 relative mx-auto">
            
            <header class="text-center mb-2 z-40">
                <h1 class="text-xl font-black tracking-[0.2em] text-orange-500 glow-text italic">FLAVOR REACTOR 3.0</h1>
                <p class="text-[7px] text-zinc-500 uppercase">Rio Grande - Tierra del Fuego</p>
            </header>

            <div class="relative w-[340px] h-[340px] flex items-center justify-center mt-10">
                <div class="absolute inset-0 border border-orange-500/10 rounded-full animate-[spin_40s_linear_infinite]"></div>
                
                <div @click="abrir({label: 'Pollo Reactor', img: 'pollo-reactor.webp'})" class="w-32 h-32 rounded-full overflow-hidden reactor-core z-10 cursor-pointer">
                    <img :src="getURL('pollo-reactor.webp')" class="w-full h-full object-cover">
                </div>

                <div v-for="(item, index) in platos" :key="item.id" 
                     :style="getPos(index, platos.length, 125)"
                     @click="abrir(item)"
                     class="absolute w-16 h-16 rounded-xl orbit-btn z-20 shadow-2xl">
                    <img :src="getURL(item.img)" class="w-full h-full object-cover">
                    <p class="absolute bottom-0 w-full text-center text-[5px] font-bold uppercase bg-black/80 py-1">{{item.label}}</p>
                </div>
            </div>

            <div class="mt-auto mb-10 w-full max-w-xs space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <div v-for="bev in bebidas" :key="bev.id" @click="abrir(bev)" class="border border-zinc-800 aspect-[3/4] rounded-lg overflow-hidden relative cursor-pointer hover:border-orange-500 transition-all">
                        <img :src="getURL(bev.img)" class="w-full h-full object-cover opacity-60">
                        <div class="absolute inset-0 flex flex-col justify-end p-2 bg-gradient-to-t from-black">
                            <span class="text-[7px] font-black uppercase text-orange-500 text-center">{{bev.label}}</span>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="modal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[2000] flex items-center justify-center p-6">
                <div class="bg-zinc-950 border border-orange-600/40 p-8 w-full max-w-xs rounded-xl text-center">
                    <h2 class="text-orange-500 text-xl font-black uppercase italic glow-text">{{seleccionada.label}}</h2>
                    <div class="h-px bg-zinc-800 w-full my-4"></div>
                    <button @click="enviarWhatsApp" class="w-full py-4 bg-orange-600 text-black font-black text-[11px] tracking-widest uppercase hover:bg-orange-400">
                        Confirmar Pedido
                    </button>
                    <button @click="modal = false" class="text-zinc-600 text-[9px] uppercase tracking-widest mt-4">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    base: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public',
                    modal: false,
                    seleccionada: null,
                    sistemaIniciado: false,
                    platos: [
                        { id: 1, img: 'asado-escolta.webp', label: 'Asado' },
                        { id: 2, img: 'milanga-soberana.webp', label: 'Milanga' },
                        { id: 3, img: 'empanada-escuadron.webp', label: 'Empanada' },
                        { id: 4, img: 'pizza-core.webp', label: 'Pizzas' },
                        { id: 5, img: 'flan-casero-nexo.webp', label: 'Postre' },
                        { id: 6, img: 'papas-mega-reactor.webp', label: 'Papas' },
                        { id: 10, img: 'mixta-organica.webp', label: 'Ensalada' }
                    ],
                    bebidas: [
                        { id: 7, img: 'birra-cryo-amber.webp', label: 'Cerveza' },
                        { id: 8, img: 'cava-tinto-premium.webp', label: 'Cava' },
                        { id: 9, img: 'soda-lemon-reactor.webp', label: 'Gaseosa' }
                    ]
                }
            },
            methods: {
                getURL(n) { return `${this.base}/${n}`; },
                getPos(i, total, radius) {
                    const angle = (i * (360 / total) - 90) * (Math.PI / 180);
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    return `transform: translate(${x}px, ${y}px)`;
                },
                iniciarNave() {
                    this.sistemaIniciado = true;
                    const amb = document.getElementById('snd-ambient');
                    amb.volume = 0.15;
                    amb.play().catch(e => console.log("Error audio"));
                    this.sonarClick();
                },
                abrir(item) {
                    this.seleccionada = item;
                    this.modal = true;
                    this.sonarClick();
                },
                sonarClick() {
                    const click = document.getElementById('snd-click');
                    click.currentTime = 0;
                    click.play();
                },
                enviarWhatsApp() {
                    const num = "5492964123456"; // CAMBIÁ POR TU NÚMERO
                    const text = `🚀 *NEXO NAVE* \n\nSolicito unidad de: *${this.seleccionada.label}*\nStatus: Hambre detectada.`;
                    window.open(`https://wa.me/${num}?text=${encodeURIComponent(text)}`);
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
