<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexo Nave | Central de Pedidos Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; min-height: 100vh; overflow: hidden; }
        
        /* Animación del Núcleo del Reactor */
        @keyframes pulse-reactor {
            0% { box-shadow: 0 0 15px #ff6400; border-color: #ff6400; }
            50% { box-shadow: 0 0 40px #ff3300; border-color: #ff3300; }
            100% { box-shadow: 0 0 15px #ff6400; border-color: #ff6400; }
        }
        .reactor-core-active { animation: pulse-reactor 2s infinite ease-in-out; border: 3px solid #ff6400 !important; }

        /* Botón de Confirmación Potenciado */
        .btn-confirmar {
            background: #ff6400; color: #000; font-weight: 900;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 100, 0, 0.6);
            transition: all 0.3s ease;
        }
        .btn-confirmar:active { transform: scale(0.95); box-shadow: 0 0 5px #ff6400; }

        /* Holograma del Pollo */
        @keyframes hologram-float {
            0% { transform: translate(-50%, -50%) scale(1) translateY(0); filter: drop-shadow(0 0 10px rgba(0,242,255,0.5)); }
            50% { transform: translate(-50%, -50%) scale(1.05) translateY(-10px); filter: drop-shadow(0 0 20px rgba(0,242,255,0.8)); }
            100% { transform: translate(-50%, -50%) scale(1) translateY(0); filter: drop-shadow(0 0 10px rgba(0,242,255,0.5)); }
        }
        .pollo-holograma {
            width: 130%; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); mix-blend-mode: plus-lighter; display: none;
        }
        .pollo-holograma.visible { display: block; animation: hologram-float 4s infinite ease-in-out; }

        /* Pantalla de Video Integrada (Opción B) */
        .video-dock {
            width: 100%; height: 100%; border: 1px solid #ff6400;
            border-radius: 8px; overflow: hidden; background: #000;
            position: relative;
        }

        /* Modales */
        .silicio-modal {
            position: fixed; inset: 0; background: rgba(0, 5, 10, 0.98);
            backdrop-filter: blur(15px); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateY(100%); transition: 0.4s ease;
        }
        .silicio-modal.active { transform: translateY(0); }

        [v-cloak] { display: none; }
    </style>
</head>
<body class="flex justify-center items-center">
    <div id="app" v-cloak class="w-full max-w-lg h-screen flex flex-col items-center py-4 px-4 relative">
        
        <header class="text-center z-50 w-full">
            <h1 class="text-xl font-black tracking-[0.3em] text-orange-500 italic mb-2">NEXO NAVE</h1>
            
            <div class="h-12 flex items-center justify-center">
                <button v-if="pedido.length > 0" @click="verResumen = true" 
                    class="btn-confirmar w-full max-w-xs py-2 rounded-lg text-sm animate-pulse">
                    CONFIRMAR PEDIDO ({{ pedido.length }})
                </button>
                <span v-else class="text-[8px] uppercase tracking-widest text-zinc-600">
                    Sistemas: {{ sistemaIniciado ? 'Online' : 'Standby' }}
                </span>
            </div>
        </header>

        <div class="relative w-[320px] h-[320px] flex items-center justify-center mt-4">
            <div class="relative w-44 h-44 z-[1000] cursor-pointer rounded-full border-2 border-zinc-900 bg-black flex items-center justify-center overflow-hidden"
                 :class="{'reactor-core-active': sistemaIniciado}"
                 @click="handlePollo">
                <div class="relative w-full h-full">
                    <img :src="getURL('pollo-reactor.webp')" class="pollo-holograma" :class="{'visible': sistemaIniciado}">
                </div>
                <div v-if="!sistemaIniciado" class="absolute inset-0 flex flex-col items-center justify-center bg-orange-600/10 rounded-full">
                    <span class="text-orange-500 text-2xl font-black italic animate-pulse">ACTIVA</span>
                </div>
            </div>

            <div v-for="(p, i) in platos" :key="p.id" 
                 :style="getPos(i, platos.length, 125)"
                 @click="abrirOpciones(p)"
                 class="absolute w-14 h-14 rounded-xl bg-black border border-white/10 overflow-hidden z-50 cursor-pointer shadow-2xl hover:border-cyan-400 transition-all">
                <img :src="getURL(p.img)" class="w-full h-full object-cover" :class="{'grayscale opacity-30': !sistemaIniciado}">
                <p class="absolute bottom-0 w-full text-center text-[5px] font-black uppercase bg-black/90 py-1 text-orange-500">{{p.label}}</p>
            </div>
        </div>

        <div class="mt-auto mb-6 w-full grid grid-cols-4 gap-2 h-24">
            <div class="col-span-2 relative">
                <div v-if="sistemaIniciado" class="video-dock">
                    <video id="adVideo" loop muted playsinline autoplay class="w-full h-full object-cover">
                        <source src="grok_video_2026-03-15-16-48-07.mp4" type="video/mp4">
                    </video>
                    <div class="absolute top-0 right-0 bg-orange-600 text-[5px] px-1 font-bold">RADAR</div>
                </div>
                <div v-else class="w-full h-full bg-zinc-900/30 border border-zinc-800 rounded-lg flex items-center justify-center">
                    <span class="text-zinc-700 text-[8px] font-black uppercase">Radar Off</span>
                </div>
            </div>
            
            <div v-for="b in bebidas.slice(0, 2)" :key="b.id" @click="abrirOpciones(b)" 
                 class="border border-zinc-900 rounded-lg overflow-hidden relative cursor-pointer hover:border-cyan-400 bg-zinc-900/50">
                <img :src="getURL(b.img)" class="w-full h-full object-cover opacity-40">
                <div class="absolute inset-0 flex items-end justify-center p-1">
                    <span class="text-[7px] font-black text-orange-500 uppercase">{{b.label}}</span>
                </div>
            </div>
        </div>

        <div class="silicio-modal" :class="{'active': panelOpciones}">
            <div v-if="itemActual" class="w-full flex flex-col items-center p-8">
                <h2 class="text-cyan-400 text-2xl font-black uppercase mb-6">{{itemActual.label}}</h2>
                <button v-for="v in itemActual.variedades" @click="agregarAlPedido(v)" 
                    class="w-full max-w-xs py-4 mb-3 bg-zinc-900 border border-cyan-400/50 text-cyan-400 text-xs font-black uppercase">
                    + {{ v }}
                </button>
                <button @click="panelOpciones = false" class="mt-6 text-zinc-500 text-[10px] uppercase font-bold">Cerrar</button>
            </div>
        </div>

        <div class="silicio-modal" :class="{'active': verResumen}">
            <div class="w-full flex flex-col items-center p-8 overflow-y-auto">
                <h2 class="text-orange-500 text-xl font-black mb-6 italic tracking-widest uppercase">Lista de Comando</h2>
                <div class="w-full space-y-3 mb-8 max-h-64 overflow-y-auto pr-2">
                    <div v-for="(it, idx) in pedido" :key="idx" class="flex justify-between items-center border-b border-zinc-800 py-3">
                        <p class="text-cyan-400 text-[10px] font-black uppercase tracking-tighter">{{it.nombre}} - {{it.variedad}}</p>
                        <button @click="pedido.splice(idx, 1)" class="text-red-600 font-bold px-2">X</button>
                    </div>
                </div>
                <button v-if="pedido.length > 0" @click="enviarWhatsApp" 
                    class="w-full py-5 bg-orange-600 text-black font-black uppercase tracking-widest shadow-[0_0_30px_#ff6400]">
                    ENVIAR PEDIDO A CENTRAL
                </button>
                <button @click="verResumen = false" class="mt-8 text-zinc-500 text-[10px] font-bold">SEGUIR SUMANDO</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    base: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public',
                    sistemaIniciado: false,
                    panelOpciones: false,
                    verResumen: false,
                    itemActual: null,
                    pedido: [],
                    platos: [
                        { id: 1, img: 'asado-escolta.webp', label: 'Asado', variedades: ['Tira', 'Vacío'] },
                        { id: 2, img: 'milanga-soberana.webp', label: 'Milanesa', variedades: ['Napolitana', 'Sola'] },
                        { id: 3, img: 'empanada-escuadron.webp', label: 'Empanadas', variedades: ['Carne', 'Pollo'] },
                        { id: 4, img: 'pizza-core.webp', label: 'Pizza', variedades: ['Muzza', 'Especial'] },
                        { id: 5, img: 'flan-casero-nexo.webp', label: 'Postre', variedades: ['Flan', 'Budín'] },
                        { id: 6, img: 'papas-mega-reactor.webp', label: 'Papas', variedades: ['Cheddar', 'Provenzal'] }
                    ],
                    bebidas: [
                        { id: 7, img: 'birra-cryo-amber.webp', label: 'Birra', variedades: ['IPA', 'Rubia'] },
                        { id: 8, img: 'cava-tinto-premium.webp', label: 'Vino', variedades: ['Malbec', 'Blanco'] }
                    ],
                    especialPollo: { label: 'Pollo Reactor', variedades: ['Entero', 'Medio', 'Cuarto'] }
                }
            },
            methods: {
                getURL(n) { return `${this.base}/${n}`; },
                getPos(i, total, radius) {
                    const angle = (i * (360 / total) - 90) * (Math.PI / 180);
                    return `transform: translate(${Math.cos(angle)*radius}px, ${Math.sin(angle)*radius}px)`;
                },
                handlePollo() {
                    if (!this.sistemaIniciado) {
                        this.sistemaIniciado = true;
                    } else {
                        this.abrirOpciones(this.especialPollo);
                    }
                },
                abrirOpciones(item) {
                    if (!this.sistemaIniciado) return;
                    this.itemActual = item;
                    this.panelOpciones = true;
                },
                agregarAlPedido(v) {
                    this.pedido.push({ nombre: this.itemActual.label, variedad: v });
                    this.panelOpciones = false;
                },
                enviarWhatsApp() {
                    let lista = this.pedido.map(it => `🔹 *${it.nombre}* (${it.variedad})`).join('\n');
                    const texto = encodeURIComponent(`🚀 *NEXO NAVE: NUEVO PEDIDO*\n\n${lista}`);
                    window.open(`https://wa.me/5492964616053?text=${texto}`);
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
