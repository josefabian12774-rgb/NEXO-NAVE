<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Arquetipo | Flavor Reactor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        .reactor-core { box-shadow: 0 0 50px rgba(255, 100, 0, 0.2); border: 2px solid #ff6400; }
        .orbit-item { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.1); }
        .orbit-item:hover { transform: scale(1.1); border-color: #ff6400; box-shadow: 0 0 20px rgba(255, 100, 0, 0.5); }
        .glow-text { text-shadow: 0 0 10px #ff6400; }
    </style>
</head>
<body>
    <div id="app" class="h-screen w-screen flex flex-col items-center justify-center relative bg-[radial-gradient(circle_at_center,_#1a1a1a_0%,_#000_100%)]">
        
        <div class="absolute top-8 text-center">
            <h1 class="text-2xl font-black tracking-[0.3em] text-orange-500 glow-text italic">FLAVOR REACTOR 2.0</h1>
            <p class="text-[8px] tracking-[0.5em] text-zinc-500 uppercase">Nexo Arquetipo Core</p>
        </div>

        <div class="relative w-[300px] h-[300px] md:w-[450px] md:h-[450px] flex items-center justify-center">
            <div class="absolute inset-0 border border-orange-500/20 rounded-full animate-[spin_20s_linear_infinite]"></div>
            <div class="absolute inset-4 border border-orange-500/10 rounded-full animate-[spin_15s_linear_infinite_reverse]"></div>
            
            <div class="w-48 h-48 md:w-64 md:h-64 rounded-full overflow-hidden reactor-core z-10 bg-black">
                <img :src="getURL('pollo-reactor.webp')" class="w-full h-full object-cover opacity-80">
            </div>

            <div v-for="(item, index) in assets" :key="item.id" 
                 :style="getPos(index)"
                 @click="abrir(item)"
                 class="absolute w-16 h-16 md:w-24 md:h-24 rounded-lg overflow-hidden orbit-item cursor-pointer bg-zinc-900 shadow-2xl z-20">
                <img :src="getURL(item.img)" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent opacity-60"></div>
                <p class="absolute bottom-1 w-full text-center text-[6px] md:text-[8px] font-bold uppercase tracking-tighter">{{item.label}}</p>
            </div>
        </div>

        <div v-if="modal" @click="modal = false" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-6">
            <div class="bg-zinc-950 border-t-4 border-orange-600 p-8 max-w-sm w-full rounded-b-xl shadow-[0_0_100px_rgba(0,0,0,1)]">
                <h2 class="text-orange-500 text-xl font-black mb-2 uppercase tracking-tighter italic">> {{seleccionada.label}}</h2>
                <div class="h-px bg-zinc-800 w-full mb-4"></div>
                <p class="text-zinc-500 text-[10px] leading-relaxed mb-6 font-mono">ESTADO: LISTO PARA DESPLIEGUE.<br>CATEGORÍA: UNIDAD_DE_CONSUMO.<br>SISTEMA: NEXO_ARQUETIPO.</p>
                <button class="w-full py-3 bg-orange-600 text-black font-black text-xs tracking-widest hover:bg-orange-400 transition-colors uppercase">Ver Carta Real</button>
            </div>
        </div>

        <div class="absolute bottom-4 opacity-20 text-[6px] tracking-widest uppercase italic">Sistema Híbrido Río Grande - 2024</div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    // LA URL QUE SAQUÉ DE TU CAPTURA
                    base: 'https://manaejtcurxbcsozqpsh.supabase.co/storage/v1/object/public/Nave-Pom-Pom/public',
                    modal: false,
                    seleccionada: null,
                    assets: [
                        { id: 1, img: 'asado-escolta.webp', label: 'Asado' },
                        { id: 2, img: 'milanga-soberana.webp', label: 'Milanga' },
                        { id: 3, img: 'empanada-escuadron.webp', label: 'Empanadas' },
                        { id: 4, img: 'pizza-core.webp', label: 'Pizzas' },
                        { id: 5, img: 'flan-casero-nexo.webp', label: 'Flan' },
                        { id: 6, img: 'birra-cryo-amber.webp', label: 'Cerveza' },
                        { id: 7, img: 'cava-tinto-premium.webp', label: 'Vinos' },
                        { id: 8, img: 'soda-lemon-reactor.webp', label: 'Bebida' }
                    ]
                }
            },
            methods: {
                getURL(n) { return `${this.base}/${n}`; },
                getPos(i) {
                    const total = this.assets.length;
                    const angle = (i * (360 / total)) * (Math.PI / 180);
                    const radius = window.innerWidth > 768 ? 220 : 160;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    return `transform: translate(${x}px, ${y}px)`;
                },
                abrir(item) { this.seleccionada = item; this.modal = true; }
            }
        }).mount('#app')
    </script>
</body>
</html>
