<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexo Nave | Central de Pedidos Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; min-height: 100vh; overflow: hidden; }
        
        /* TU ESTILO ORIGINAL */
        @keyframes pulse-reactor {
            0%, 100% { box-shadow: 0 0 15px #ff6400; border-color: #ff6400; }
            50% { box-shadow: 0 0 40px #ff3300; border-color: #ff3300; }
        }
        .reactor-core-active { animation: pulse-reactor 2s infinite ease-in-out; border: 3px solid #ff6400 !important; }

        .btn-vidrio-cian {
            background: rgba(0, 242, 255, 0.1); color: #00f2ff; font-weight: 900;
            text-transform: uppercase; letter-spacing: 2px; border: 1px solid #00f2ff;
            backdrop-filter: blur(5px); box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            transition: all 0.3s ease;
        }

        /* CAPA DE LLUVIA */
        #data-rain { position: fixed; inset: 0; pointer-events: none; z-index: 20000; display: none; }
        .rain-char { position: absolute; color: #00f2ff; font-family: monospace; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh); opacity: 0; } }

        .silicio-modal {
            position: fixed; inset: 0; background: rgba(0, 5, 10, 0.98);
            backdrop-filter: blur(15px); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateY(100%); transition: 0.4s ease;
        }
        .silicio-modal.active { transform: translateY(0); }

        [v-cloak] { display: none; }
    </style>
</head>
<body class="flex justify-center items-center">
    <div id="app" v-cloak class="w-full max-w-lg h-screen flex flex-col items-center py-4 px-4 relative">
        <div id="data-rain"></div>
        
        <div v-if="!sessionActiva" class="w-full flex justify-between items-center px-2 mb-2 bg-orange-600/10 border border-orange-500/20 rounded-md py-1">
            <span class="text-[6px] text-orange-500 font-black uppercase italic">Nave en Modo Fantasma (24h)</span>
            <button @click="panelRegistro = true" class="text-[6px] bg-orange-500 text-black px-2 py-0.5 rounded font-bold uppercase">Consolidar / Login</button>
        </div>

        <header class="text-center z-50 w-full relative">
            <div class="absolute top-0 right-0 bg-zinc-900/80 border border-cyan-500/30 p-1 rounded flex flex-col items-center">
                <span class="text-[5px] text-cyan-400 uppercase font-black">Ciclos</span>
                <span class="text-[10px] font-mono text-white">0842</span>
            </div>

            <h1 @click="almiranteCheck" class="text-xl font-black tracking-[0.3em] text-orange-500 italic mb-2 cursor-pointer">NEXO NAVE</h1>
            
            <div class="h-14 flex items-center justify-center">
                <button v-if="pedido.length > 0" @click="verResumen = true" 
                    class="btn-vidrio-cian w-full max-w-xs py-3 rounded-xl text-xs animate-pulse">
                    CONFIRMAR PEDIDO ({{ pedido.length }})
                </button>
                <div v-else class="flex flex-col items-center">
                    <span class="text-[8px] uppercase tracking-[0.5em] text-zinc-600 font-bold">
                        ESTADO: {{ sistemaIniciado ? 'OPERATIVO' : 'EN ESPERA' }}
                    </span>
                </div>
            </div>
        </header>

        <div class="relative w-[320px] h-[320px] flex items-center justify-center mt-4">
            <div class="relative w-44 h-44 z-[1000] cursor-pointer rounded-full border-2 border-zinc-900 bg-black flex items-center justify-center overflow-hidden"
                 :class="{'reactor-core-active': sistemaIniciado}" @click="handlePollo">
                <img :src="base + '/pollo-reactor.webp'" class="w-[130%] absolute mix-blend-plus-lighter" v-if="sistemaIniciado">
                <div v-if="!sistemaIniciado" class="absolute inset-0 flex items-center justify-center bg-orange-600/10">
                    <span class="text-orange-500 text-2xl font-black italic animate-pulse uppercase">Activa</span>
                </div>
            </div>

            <div v-for="(p, i) in platos" :key="p.id" :style="getPos(i, platos.length, 125)" @click="abrirOpciones(p)"
                 class="absolute w-14 h-14 rounded-xl bg-black border border-white/10 overflow-hidden z-50 cursor-pointer shadow-2xl transition-all">
                <img :src="base + '/' + p.img" class="w-full h-full object-cover" :class="{'grayscale opacity-30': !sistemaIniciado}">
                <p class="absolute bottom-0 w-full text-center text-[5px] font-black uppercase bg-black/90 py-1 text-orange-500">{{p.label}}</p>
            </div>
        </div>

        <div class="mt-auto mb-6 w-full grid grid-cols-4 gap-2 h-24">
            <div v-for="b in bebidas" :key="b.id" @click="abrirOpciones(b)" class="border border-zinc-900 rounded-lg overflow-hidden relative cursor-pointer bg-zinc-900/50">
                <img :src="base + '/' + b.img" class="w-full h-full object-cover opacity-40">
                <div class="absolute inset-0 flex items-end justify-center p-1">
                    <span class="text-[7px] font-black text-orange-500 uppercase">{{b.label}}</span>
                </div>
            </div>
            <div class="monitor-video" @click="toggleVideoAudio">
                <video id="adVideo" loop muted playsinline autoplay class="w-full h-full object-cover opacity-60">
                    <source src="grok_video_2026-03-15-16-48-07.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <div class="silicio-modal" :class="{'active': panelRegistro}">
            <div class="w-full max-w-sm p-8 text-center" v-if="!aceptoPilares">
                <h2 class="text-orange-500 text-xl font-black italic mb-6">CONTRATO NEXO</h2>
                <div class="text-[8px] text-left text-zinc-400 space-y-3 mb-8 uppercase tracking-widest leading-relaxed">
                    <p v-for="p in pilares">🔹 {{p}}</p>
                </div>
                <button @click="aceptoPilares = true" class="btn-vidrio-cian w-full py-4 text-[10px]">ACEPTAR Y REGISTRAR</button>
                <button @click="panelRegistro = false" class="mt-4 text-[8px] text-zinc-600 block w-full uppercase">Volver</button>
            </div>
            <div class="w-full max-w-sm p-8 text-center" v-else>
                <h2 class="text-cyan-400 text-xl font-black mb-6 uppercase tracking-widest">Sincronizar ADN</h2>
                <input v-model="formADN.wa" type="tel" placeholder="TU WHATSAPP" class="bg-black border border-zinc-800 p-4 w-full mb-3 text-cyan-400 text-center text-xs">
                <input v-model="formADN.dni" type="text" placeholder="DNI / CUIT" class="bg-black border border-zinc-800 p-4 w-full mb-6 text-cyan-400 text-center text-xs">
                <button @click="consolidarVuelo" class="btn-vidrio-cian w-full py-4">Sincronizar Unidad</button>
            </div>
        </div>

        <div class="silicio-modal" :class="{'active': panelOpciones}">
            <div v-if="itemActual" class="w-full flex flex-col items-center p-8">
                <h2 class="text-cyan-400 text-2xl font-black uppercase mb-6 text-center">{{itemActual.label}}</h2>
                <button v-for="v in itemActual.variedades" @click="agregarAlPedido(v)" class="btn-vidrio-cian w-full max-w-xs py-4 mb-3 text-xs">+ {{ v }}</button>
                <button @click="panelOpciones = false" class="mt-6 text-zinc-500 text-[10px] uppercase font-bold">Cerrar</button>
            </div>
        </div>

        <div class="silicio-modal" :class="{'active': verResumen}">
            <div class="w-full flex flex-col items-center p-8 overflow-y-auto">
                <h2 class="text-orange-500 text-xl font-black mb-6 italic uppercase">Lista de Comando</h2>
                <div class="w-full space-y-3 mb-8 max-h-64 overflow-y-auto pr-2">
                    <div v-for="(it, idx) in pedido" :key="idx" class="flex justify-between items-center border-b border-zinc-800 py-3">
                        <p class="text-cyan-400 text-[10px] font-black uppercase">{{it.nombre}} - {{it.variedad}}</p>
                        <button @click="pedido.splice(idx, 1)" class="text-red-600 font-bold px-2">X</button>
                    </div>
                </div>
                <button v-if="pedido.length > 0" @click="enviarWhatsApp" class="btn-vidrio-cian w-full py-5 text-sm">ENVIAR PEDIDO</button>
                <button @click="verResumen = false" class="mt-8 text-zinc-500 text-[10px] font-bold">SEGUIR SUMANDO</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    base: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public',
                    sistemaIniciado: false, panelOpciones: false, panelRegistro: false, verResumen: false,
                    aceptoPilares: false, sessionActiva: localStorage.getItem('nexo_consolidado') === 'true',
                    pedido: [], itemActual: null, formADN: { wa: '', dni: '' },
                    pilares: ["Propiedad Nexo", "Ciclo 30 días", "Identidad WA/DNI", "Responsabilidad Cliente", "Protocolo Anchored", "Jurisdicción TDF"],
                    platos: [
                        { id: 1, img: 'asado-escolta.webp', label: 'Asado', variedades: ['Tira', 'Vacío'] },
                        { id: 2, img: 'milanga-soberana.webp', label: 'Milanesa', variedades: ['Napolitana', 'Sola'] },
                        { id: 3, img: 'empanada-escuadron.webp', label: 'Empanadas', variedades: ['Carne', 'Pollo'] },
                        { id: 4, img: 'pizza-core.webp', label: 'Pizza', variedades: ['Muzza', 'Especial'] },
                        { id: 5, img: 'flan-casero-nexo.webp', label: 'Postre', variedades: ['Flan'] },
                        { id: 6, img: 'papas-mega-reactor.webp', label: 'Papas', variedades: ['Cheddar'] }
                    ],
                    bebidas: [{ id: 7, img: 'birra-cryo-amber.webp', label: 'Birra', variedades: ['Rubia'] }]
                }
            },
            mounted() { this.checkCicloFantasma(); },
            methods: {
                getPos(i, total, radius) {
                    const angle = (i * (360 / total) - 90) * (Math.PI / 180);
                    return `transform: translate(${Math.cos(angle)*radius}px, ${Math.sin(angle)*radius}px)`;
                },
                checkCicloFantasma() {
                    const h = localStorage.getItem('nexo_h_fantasma');
                    if(!h) localStorage.setItem('nexo_h_fantasma', new Date().toISOString());
                    else if(!this.sessionActiva && (new Date() - new Date(h)) / 36e5 >= 24) { localStorage.clear(); location.reload(); }
                },
                handlePollo() {
                    if (!this.sistemaIniciado) {
                        this.sistemaIniciado = true;
                        const a = new Audio(this.base+'/sonido-motor.mp3'); a.loop = true; a.volume = 0.1; a.play().catch(e=>{});
                    } else { this.itemActual = { label: 'Pollo Reactor', variedades: ['Entero', 'Medio'] }; this.panelOpciones = true; }
                },
                abrirOpciones(item) { if(this.sistemaIniciado){ this.itemActual = item; this.panelOpciones = true; } },
                agregarAlPedido(v) { this.pedido.push({ nombre: this.itemActual.label, variedad: v }); this.panelOpciones = false; },
                consolidarVuelo() {
                    if(this.formADN.wa && this.formADN.dni) { this.lluvia('#00f2ff'); localStorage.setItem('nexo_consolidado','true'); setTimeout(()=>location.reload(), 2500); }
                },
                almiranteCheck() {
                    if(prompt("PASSWORD ALMIRANTE") === "051112182129jsm13818") { this.lluvia('#ffcc00'); localStorage.setItem('nexo_consolidado','true'); setTimeout(()=>location.reload(), 2500); }
                },
                lluvia(color) {
                    const r = document.getElementById('data-rain'); r.style.display = 'block';
                    for(let i=0; i<60; i++){
                        let c = document.createElement('div'); c.className = 'rain-char'; c.innerText = Math.random()>0.5?'1':'0';
                        c.style.left = Math.random()*100+'vw'; c.style.color = color; c.style.animationDuration = (Math.random()*2+1)+'s'; r.appendChild(c);
                    }
                },
                toggleVideoAudio() { const v = document.getElementById('adVideo'); if(v) v.muted = !v.muted; },
                enviarWhatsApp() {
                    let lista = this.pedido.map(it => `🔹 *${it.nombre}* (${it.variedad})`).join('\n');
                    window.open(`https://wa.me/5492964616053?text=${encodeURIComponent(lista)}`);
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
