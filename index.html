<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO NAVE - El Bodegón</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .nexo-card { background: #161b22; border: 1px solid #30363d; border-radius: 1.5rem; transition: transform 0.2s; }
        .nexo-card:active { transform: scale(0.98); }
        .price-tag { color: #58a6ff; font-weight: 800; }
        .btn-whatsapp { background-color: #23c55e; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4); }
    </style>
</head>
<body class="p-6 flex flex-col min-h-screen">
    
    <header class="text-center mb-10">
        <h1 class="text-4xl font-extrabold text-blue-500 tracking-tight">NEXO NAVE</h1>
        <p class="text-slate-400 text-sm mt-1">Sistema de Pedidos Online - El Bodegón</p>
    </header>

    <div class="flex-grow space-y-6 max-w-md mx-auto w-full">
        <div class="nexo-card p-5 flex justify-between items-center">
            <div class="flex-1">
                <h3 class="text-xl font-bold">🦖 Lomosaurio</h3>
                <p class="text-slate-400 text-sm">El más grande de Río Grande</p>
                <p class="price-tag text-lg mt-2">$8.500</p>
            </div>
            <div class="bg-blue-600/20 p-4 rounded-2xl border border-blue-500/30">
                <span class="text-2xl">🛒</span>
            </div>
        </div>

        <div class="nexo-card p-5 flex justify-between items-center">
            <div class="flex-1">
                <h3 class="text-xl font-bold">🍳 Milagruesa</h3>
                <p class="text-slate-400 text-sm">Con papas y dos huevos</p>
                <p class="price-tag text-lg mt-2">$7.200</p>
            </div>
            <div class="bg-blue-600/20 p-4 rounded-2xl border border-blue-500/30">
                <span class="text-2xl">🛒</span>
            </div>
        </div>
    </div>

    <footer class="text-center py-10 text-slate-500 text-xs italic">
        Powered by Nexo Nave & GitHub Pages
    </footer>

    <div class="fixed bottom-8 left-6 right-6">
        <a href="https://wa.me/5492964000000" class="btn-whatsapp w-full py-5 rounded-3xl flex justify-center items-center text-xl font-black text-white uppercase tracking-widest">
            PEDIR POR WHATSAPP
        </a>
    </div>

</body>
</html>
