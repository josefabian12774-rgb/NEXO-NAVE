<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Nave | Protocolo de Silicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; min-height: 100vh; overflow: hidden; }
        
        /* Animación de Reactor Activo */
        @keyframes glow {
            0% { box-shadow: 0 0 20px #ff6400; border-color: #ff6400; }
            50% { box-shadow: 0 0 60px #ff3300; border-color: #ff3300; }
            100% { box-shadow: 0 0 20px #ff6400; border-color: #ff6400; }
        }
        .active-glow { animation: glow 2s infinite ease-in-out; border: 4px solid #ff6400 !important; }

        /* Pantalla de Silicio */
        .pantalla-silicio {
            position: fixed; inset: 0; background: rgba(0, 15, 30, 0.98);
            backdrop-filter: blur(25px); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateY(100%); transition: 0.5s ease;
        }
        .pantalla-silicio.show { transform: translateY(0); }

        /* Botón de Variedad */
        .btn-variedad {
            width: 85%; padding: 20px; margin: 10px;
            background: rgba(0, 242, 255, 0.05); border: 1px solid #00f2ff;
            color: #00f2ff; font-weight: 900; text-transform: uppercase;
            letter-spacing: 4px; transition: 0.3s;
        }

        /* El Reactor como un todo */
        .reactor-container {
            position: relative; width: 220px; height: 220px;
            cursor: pointer; z-index: 500; border-radius: 50%;
        }
        
        [v-cloak] { display: none; }
    </style>
</head>
<body class="flex justify-center items-center">
    <div id="app" v-cloak class="w-full max-w-lg h-screen flex flex-col items-center py-8 px-4 relative">
        
        <header class="text-center mb-6 z-10">
            <h1 class="text-2xl font-black tracking-widest text-orange-500 italic">NEXO NAVE</h1>
            <p class="text-[9px] text-zinc-500 uppercase tracking-[0.5em]">Energía: {{ sistemaIniciado ? 'Estable' : 'Cero' }}</p>
        </header>

        <div class="relative w-[360px] h-[360px] flex items-center justify-center">
            
            <div class="reactor-container flex items-center justify-center overflow-hidden bg-black border-2 border-zinc-800"
                 :class="{'active-glow': sistemaIniciado}"
                 @click="clickReactor">
                
                <img :src="getURL('pollo-reactor.webp')" class="w-full h-full object-cover transition-all duration-1000"
                     :class="sistemaIniciado ? 'opacity-100 scale-110' : 'opacity-20 grayscale'">

                <div v-if="!sistemaIniciado" class="absolute inset-0 flex items-center justify-center bg-orange-600/20">
                    <span class="text-white font-black text-xs animate-pulse">IGNICIÓN</span>
                </div>
            </div>

            <div v-for="(p, i) in platos" :key="p.id" 
                 :style="getPos(i, platos.length, 145)"
                 @click.stop="abrirPanel(p)"
                 class="absolute w-16 h-16 rounded-xl bg-black/90 border border-white/10 overflow-hidden z-20">
                <img :src="getURL(p.img)" class="w-full h-full object-cover" :class="{'grayscale opacity-30': !sistemaIniciado}">
                <p class="absolute bottom-0 w-full text-center text-[6px] font-bold uppercase bg-black/95 py-1 text-orange-500">{{p.label}}</p>
            </div>
        </div>

        <div class="pantalla-silicio" :class="{'show': panelVisible}">
            <div v-if="seleccionado" class="w-full flex flex-col items-center p-8">
                <div class="w-32 h-32 rounded-full border-4 border-cyan-400 overflow-hidden mb-6 shadow-[0_0_40px_cyan]">
                    <img :src="getURL(seleccionado.img)" class="w-full h-full object-cover">
                </div>
                <h2 class="text-cyan-400 text-3xl font-black uppercase tracking-tighter">{{seleccionado.label}}</h2>
                
                <div class="w-full mt-8 flex flex-col items-center">
                    <button v-for="v in seleccionado.variedades" @click="enviarPedido(v)" class="btn-variedad">
                        {{ v }}
                    </button>
                </div>

                <button @click="panelVisible = false" class="mt-12 text-red-500 text-[10px] font-black uppercase tracking-widest">
                    [ CERRAR ]
                </button>
            </div>
        </div>

        <div class="mt-auto mb-10 w-full max-w-xs grid grid-cols-3 gap-3">
            <div v-for="b in bebidas" :key="b.id" @click="abrirPanel(b)" 
                 class="border border-zinc-900 rounded-lg overflow-hidden aspect-[3/4] relative">
                <img :src="getURL(b.img)" class="w-full h-full object-cover opacity-40">
                <div class="absolute inset-0 bg-gradient-to-t from-black flex items-end justify-center p-3">
                    <span class="text-[8px] font-black text-orange-500 uppercase">{{b.label}}</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    base: 'https://manaejtcurxbcsozqcsh.supabase.co/storage/v1/object/public/imagenes/public',
                    sistemaIniciado: false,
                    panelVisible: false,
                    seleccionado: null,
                    platos: [
                        { id: 1, img: 'asado-escolta.webp', label: 'Asado', variedades: ['Costillar', 'Vacío', 'Entraña'] },
                        { id: 2, img: 'milanga-soberana.webp', label: 'Milanesa', variedades: ['Napolitana', 'A Caballo'] },
                        { id: 3, img: 'empanada-escuadron.webp', label: 'Empanadas', variedades: ['Carne', 'Pollo', 'JyQ'] },
                        { id: 4, img: 'pizza-core.webp', label: 'Pizza', variedades: ['Muzza', 'Especial'] },
                        { id: 5, img: 'flan-casero-nexo.webp', label: 'Postre', variedades: ['Flan', 'Budín'] },
                        { id: 6, img: 'papas-mega-reactor.webp', label: 'Papas', variedades: ['Cheddar', 'Provenzal'] },
                        { id: 10, img: 'mixta-organica.webp', label: 'Ensalada', variedades: ['Mixta', 'Rusa'] }
                    ],
                    bebidas: [
                        { id: 7, img: 'birra-cryo-amber.webp', label: 'Cerveza', variedades: ['Lata', 'Litro'] },
                        { id: 8, img: 'cava-tinto-premium.webp', label: 'Vino', variedades: ['Malbec', 'Blanco'] },
                        { id: 9, img: 'soda-lemon-reactor.webp', label: 'Gaseosa', variedades: ['Coca', 'Soda'] }
                    ],
                    especialPollo: { img: 'pollo-reactor.webp', label: 'Pollo Reactor', variedades: ['Pollo Entero', 'Medio Pollo'] }
                }
            },
            methods: {
                getURL(n) { return `${this.base}/${n}`; },
                getPos(i, total, radius) {
                    const angle = (i * (360 / total) - 90) * (Math.PI / 180);
                    return `transform: translate(${Math.cos(angle)*radius}px, ${Math.sin(angle)*radius}px)`;
                },
                clickReactor() {
                    if (!this.sistemaIniciado) {
                        this.sistemaIniciado = true;
                        new Audio(this.getURL('sonido-motor.mp3')).play();
                        new Audio(this.getURL('click-reactor.mp3')).play();
                    } else {
                        this.abrirPanel(this.especialPollo);
                    }
                },
                abrirPanel(item) {
                    if (!this.sistemaIniciado) return;
                    new Audio(this.getURL('click-reactor.mp3')).play();
                    this.seleccionado = item;
                    this.panelVisible = true;
                },
                enviarPedido(v) {
                    const msg = encodeURIComponent(`🚀 *NEXO NAVE*\n\nUNIDAD: *${this.seleccionado.label}*\nVARIEDAD: *${v}*`);
                    window.open(`https://wa.me/5492964123456?text=${msg}`);
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
