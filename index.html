<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POMPÓN NAVE - RÍO GRANDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* CABECERA */
        .header-nave { text-align: center; padding: 15px; border-bottom: 1px solid #333; background: rgba(10,10,10,0.9); }
        .titulo { font-style: italic; font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }
        .titulo span { color: #ff4500; text-shadow: 0 0 10px #ff4500; }

        /* ESCENA CENTRAL DEL REACTOR */
        .escena { position: relative; height: 75vh; width: 100vw; display: flex; align-items: center; justify-content: center; }
        
        .reactor-wrapper { position: relative; width: 260px; height: 260px; z-index: 10; }
        
        /* GIRO MECÁNICO */
        .anillo-externo {
            position: absolute; inset: 0; border: 4px solid transparent;
            border-top: 4px solid #ff4500; border-bottom: 4px solid #ff4500;
            border-radius: 50%; animation: spin 4s linear infinite;
            filter: drop-shadow(0 0 15px #ff4500);
        }
        
        .anillo-datos {
            position: absolute; inset: 15px; border: 1px dashed #555;
            border-radius: 50%; animation: spin-rev 10s linear infinite; opacity: 0.3;
        }

        .nucleo {
            position: absolute; inset: 30px; background: radial-gradient(circle, #300, #000);
            border: 2px solid #444; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            box-shadow: inset 0 0 40px #ff4500;
        }
        .nucleo img { width: 75%; filter: drop-shadow(0 0 15px #ff4500); transform: scale(1.1); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        /* TARJETAS HUD POSICIONADAS */
        .card-hud {
            position: absolute; width: 155px; background: rgba(0,0,0,0.85);
            border-left: 4px solid #ff4500; padding: 10px;
            clip-path: polygon(0 0, 85% 0, 100% 25%, 100% 100%, 0 100%);
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.2);
        }
        
        /* Posiciones exactas para que entren todos */
        .p1 { top: 10%; left: 5%; }    /* Parrillada */
        .p2 { top: 10%; right: 5%; }   /* Pollo Parrilla */
        .p3 { bottom: 25%; left: 5%; } /* Lomo Saltado */
        .p4 { bottom: 25%; right: 5%; }/* Pizzas */

        .tag { font-size: 7px; color: #ff4500; font-weight: 900; }
        .item-name { font-size: 9px; font-weight: 900; margin: 2px 0; text-transform: uppercase; }
        .item-price { color: #ffcc00; font-size: 13px; font-weight: 900; font-style: italic; }

        /* SECCIÓN CREATIVA: BEBIDAS (FUEL LEVELS) */
        .fuel-section {
            position: absolute; bottom: 80px; width: 100%; display: flex; 
            justify-content: center; gap: 15px; padding: 0 20px;
        }
        .fuel-bar { width: 60px; height: 35px; background: #111; border: 1px solid #333; position: relative; }
        .fuel-fill { position: absolute; bottom: 0; width: 100%; background: #ff4500; box-shadow: 0 0 10px #ff4500; }
        .fuel-label { position: absolute; top: -12px; width: 100%; text-align: center; font-size: 6px; color: #888; }

        /* BARRA INFERIOR */
        nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 18px; background: #050505; border-top: 1px solid #222; font-size: 9px; }
        .active { color: #ff4500; text-shadow: 0 0 8px #ff4500; }
    </style>
</head>
<body>
    <div class="header-nave">
        <div class="titulo italic">POMPÓN <span>NAVE</span></div>
        <div class="text-[7px] text-zinc-500 tracking-[4px]">DISTRICT: RÍO GRANDE - TDF</div>
    </div>

    <div class="escena">
        <div class="card-hud p1">
            <div class="tag">SECTOR: PARRILLA</div>
            <div class="item-name">PARRILLADA COMPLETA</div>
            <div class="item-price">$12500</div>
        </div>

        <div class="card-hud p2">
            <div class="tag">SECTOR: AVES</div>
            <div class="item-name">POLLO A LA PARRILLA</div>
            <div class="item-price">$5500</div>
        </div>

        <div class="card-hud p3">
            <div class="tag">SECTOR: CARNE</div>
            <div class="item-name">LOMO SALTADO POM</div>
            <div class="item-price">$8200</div>
        </div>

        <div class="card-hud p4">
            <div class="tag">SECTOR: MASAS</div>
            <div class="item-name">PIZZA MUZZA NAVE</div>
            <div class="item-price">$4200</div>
        </div>

        <div class="reactor-wrapper">
            <div class="anillo-externo"></div>
            <div class="anillo-datos"></div>
            <div class="nucleo">
                <img src="https://i.ibb.co/6R0n7Y0/pollo-reactor.png" alt="Reactor Core">
            </div>
            <div class="absolute -bottom-6 w-full text-center text-[7px] text-orange-500 font-bold tracking-[3px]">FLAVOR REACTOR ACTIVE</div>
        </div>

        <div class="fuel-section">
            <div class="fuel-bar">
                <div class="fuel-label italic">QUILMES 1L</div>
                <div class="fuel-fill" style="height: 80%;"></div>
                <div class="absolute inset-0 flex items-center justify-center text-[8px] font-black">$3200</div>
            </div>
            <div class="fuel-bar">
                <div class="fuel-label italic">GASEOSA</div>
                <div class="fuel-fill" style="height: 60%;"></div>
                <div class="absolute inset-0 flex items-center justify-center text-[8px] font-black">$1500</div>
            </div>
            <div class="fuel-bar">
                <div class="fuel-label italic">WINE CORE</div>
                <div class="fuel-fill" style="height: 40%;"></div>
                <div class="absolute inset-0 flex items-center justify-center text-[8px] font-black">$4500</div>
            </div>
        </div>
    </div>

    <nav>
        <div class="active">IGNITION</div>
        <div>ORBIT</div>
        <div>PILOT CORE</div>
        <div>SUPPLY</div>
    </nav>
</body>
</html>
